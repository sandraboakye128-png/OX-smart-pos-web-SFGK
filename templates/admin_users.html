{% extends 'base.html' %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-3xl font-bold text-gray-800">👥 User Management</h1>
        <p class="text-sm text-gray-500 mt-1">Manage system users and their permissions</p>
    </div>
    <div class="text-sm text-gray-500">
        <span class="bg-green-100 text-green-800 px-2 py-1 rounded">👤 You: {{ current_user.username }}</span>
    </div>
</div>

<!-- Hidden input to store current user ID -->
<input type="hidden" id="currentUserId" value="{{ current_user.id|default(0) }}">
<input type="hidden" id="currentUsername" value="{{ current_user.username|default('') }}">

<!-- Create User Form -->
<div class="bg-white rounded-lg shadow p-6 mb-8">
    <h2 class="text-xl font-semibold mb-4">➕ Create New User</h2>
    <form id="createUserForm" class="flex flex-wrap gap-4 items-end">
        <div>
            <label class="block text-sm font-medium text-gray-700">Username</label>
            <input type="text" id="newUsername" required autocomplete="off"
                   class="mt-1 px-3 py-2 border border-gray-300 rounded-md focus:ring focus:ring-indigo-200 w-48">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" id="newPassword" required autocomplete="new-password"
                   class="mt-1 px-3 py-2 border border-gray-300 rounded-md focus:ring focus:ring-indigo-200 w-48">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Role</label>
            <select id="newRole" class="mt-1 px-3 py-2 border border-gray-300 rounded-md">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <button type="submit" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-md transition">
            Create User
        </button>
    </form>
    <div id="createMessage" class="mt-2 text-sm"></div>
</div>

<!-- Users Table -->
<div class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Username</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Created At</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
        </thead>
        <tbody id="usersTableBody" class="bg-white divide-y divide-gray-200">
            <!-- rows inserted by JS -->
        </tbody>
    </table>
</div>

<script>
    // Get the logged-in user's ID and username from the hidden input
    const currentUserId = parseInt(document.getElementById('currentUserId').value) || 0;
    const currentUsername = document.getElementById('currentUsername').value || '';

    async function fetchUsers() {
        const res = await fetch('/api/admin/users');
        if (!res.ok) throw new Error('Failed to fetch users');
        return res.json();
    }

    function getStatusBadge(role, isProtected) {
        if (isProtected) {
            return '<span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">🔒 Protected</span>';
        }
        if (role === 'admin') {
            return '<span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">Admin</span>';
        }
        return '<span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">User</span>';
    }

    function renderUsers(users) {
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';
        if (users.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-gray-500">No users found.</td></tr>`;
            return;
        }
        users.forEach(user => {
            const tr = document.createElement('tr');
            const isCurrentUser = user.id === currentUserId;
            const isProtected = user.username && user.username.toLowerCase() === 'oxbee';
            const statusBadge = getStatusBadge(user.role, isProtected);
            
            tr.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.id}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                    ${escapeHtml(user.username)}
                    ${isCurrentUser ? ' <span class="text-xs text-gray-400">(You)</span>' : ''}
                    ${isProtected ? ' <span class="text-xs text-red-500 font-bold">🔒</span>' : ''}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                    ${statusBadge}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${user.created_at ? new Date(user.created_at).toLocaleString() : '—'}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                    <!-- Edit Button (all users except protected) -->
                    <a href="/admin/users/${user.id}/edit" 
                       class="text-blue-600 hover:text-blue-900 ${isProtected ? 'opacity-50 cursor-not-allowed' : ''}"
                       ${isProtected ? 'onclick="return false;" title="Cannot edit system administrator"' : ''}>
                        ✏️ Edit
                    </a>
                    
                    ${!isCurrentUser && !isProtected ? `
                        <button class="role-toggle text-indigo-600 hover:text-indigo-900 ml-2" 
                                data-id="${user.id}" 
                                data-role="${user.role === 'admin' ? 'user' : 'admin'}">
                            ${user.role === 'admin' ? 'Demote' : 'Promote'}
                        </button>
                        <button class="delete-user text-red-600 hover:text-red-900 ml-2" data-id="${user.id}">Delete</button>
                    ` : ''}
                    
                    ${isProtected && !isCurrentUser ? `
                        <span class="text-gray-400 text-xs ml-2">🔒 System Protected</span>
                    ` : ''}
                </td>
            `;
            tbody.appendChild(tr);
        });

        // Attach event listeners for role toggle
        document.querySelectorAll('.role-toggle').forEach(btn => {
            btn.addEventListener('click', async function() {
                const userId = this.dataset.id;
                const newRole = this.dataset.role;
                if (!confirm(`Change role to "${newRole}"?`)) return;
                try {
                    const res = await fetch(`/api/admin/users/${userId}/role`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ role: newRole })
                    });
                    const data = await res.json();
                    if (data.success) {
                        loadUsers();
                    } else {
                        alert('Failed: ' + (data.error || 'Unknown error'));
                    }
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            });
        });

        // Attach event listeners for delete
        document.querySelectorAll('.delete-user').forEach(btn => {
            btn.addEventListener('click', async function() {
                const userId = this.dataset.id;
                if (!confirm('Delete this user? This cannot be undone.')) return;
                if (!confirm('Are you sure? This action is permanent.')) return;
                try {
                    const res = await fetch(`/api/admin/users/${userId}`, { method: 'DELETE' });
                    const data = await res.json();
                    if (data.success) {
                        loadUsers();
                    } else {
                        alert('Failed: ' + (data.error || 'Unknown error'));
                    }
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            });
        });
    }

    // Simple escape function to prevent XSS
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function loadUsers() {
        try {
            const users = await fetchUsers();
            renderUsers(users);
        } catch (err) {
            console.error(err);
            document.getElementById('usersTableBody').innerHTML =
                `<tr><td colspan="5" class="text-center py-4 text-red-500">Failed to load users: ${err.message}</td></tr>`;
        }
    }

    // Create user form submission
    document.getElementById('createUserForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('newUsername').value.trim();
        const password = document.getElementById('newPassword').value.trim();
        const role = document.getElementById('newRole').value;
        const msg = document.getElementById('createMessage');

        if (!username || !password) {
            msg.className = 'text-red-500';
            msg.textContent = 'Username and password are required.';
            return;
        }

        try {
            const res = await fetch('/api/admin/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });
            const data = await res.json();
            if (data.success) {
                msg.className = 'text-green-500';
                msg.textContent = 'User created successfully!';
                document.getElementById('newUsername').value = '';
                document.getElementById('newPassword').value = '';
                loadUsers();
            } else {
                msg.className = 'text-red-500';
                msg.textContent = 'Error: ' + (data.error || 'Unknown error');
            }
        } catch (err) {
            msg.className = 'text-red-500';
            msg.textContent = 'Network error: ' + err.message;
        }
    });

    // Initial load
    loadUsers();
</script>
{% endblock %}
