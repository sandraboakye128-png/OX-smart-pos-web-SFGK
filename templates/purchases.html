{% extends 'base.html' %}

{% block content %}
<div class="p-6">
    <!-- ADD / EDIT FORM -->
    <div class="bg-white rounded-xl shadow-md p-6 mb-6">
        <h2 class="text-xl font-bold mb-4" id="formTitle">➕ Add Purchase</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-7 gap-3">
            <div>
                <label class="block text-sm font-medium text-gray-700">Product Name</label>
                <input type="text" id="name" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2" autocomplete="off">
                <div id="nameSuggestions" class="absolute z-10 bg-white border rounded-lg shadow-lg hidden"></div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Brand</label>
                <input type="text" id="brand" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Category</label>
                <input type="text" id="category" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2" autocomplete="off">
                <div id="categorySuggestions" class="absolute z-10 bg-white border rounded-lg shadow-lg hidden"></div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Quantity</label>
                <input type="number" id="quantity" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Cost Price (₵)</label>
                <input type="number" step="0.01" id="cost_price" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Discount (₵)</label>
                <input type="number" step="0.01" id="discount" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Selling Price (₵)</label>
                <input type="number" step="0.01" id="selling_price" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
            </div>
        </div>
        <div class="mt-4 flex gap-3">
            <button id="submitBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-6 py-2 rounded-lg">➕ Add Purchase</button>
            <button id="cancelBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-2 rounded-lg hidden">Cancel Edit</button>
        </div>
    </div>

    <!-- SEARCH & FILTER BAR -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-6 flex flex-wrap gap-4 items-end">
        <div class="flex-1 min-w-[200px]">
            <label class="block text-sm font-medium text-gray-700">Search (name/brand/category)</label>
            <input type="text" id="searchInput" placeholder="🔍 Type to filter..." class="w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">From Date</label>
            <input type="date" id="fromDate" class="border border-gray-300 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">To Date</label>
            <input type="date" id="toDate" class="border border-gray-300 rounded-lg px-3 py-2">
        </div>
        <button id="filterBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">🔍 Filter</button>
        <button id="pdfBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-5 py-2 rounded-lg">🧾 PDF Report</button>
    </div>

    <!-- PURCHASES LIST (scrollable) -->
    <div class="bg-white rounded-xl shadow-md p-4">
        <div id="purchasesList" class="max-h-[500px] overflow-y-auto space-y-3">
            <!-- dynamically loaded -->
        </div>
        <div id="summary" class="mt-4 p-3 bg-gray-50 rounded-lg font-bold text-center text-teal-700"></div>
    </div>
</div>

<script>
    let currentPurchases = [];
    let editMode = false;
    let editBatchId = null;

    // Load all purchases
    async function loadPurchases() {
        const res = await fetch('/api/purchases');
        currentPurchases = await res.json();
        renderList(currentPurchases);
    }

    // Render list with update buttons
    function renderList(purchases) {
        const container = document.getElementById('purchasesList');
        if (!purchases.length) {
            container.innerHTML = '<div class="text-center text-gray-400 py-8">No purchase records found.</div>';
            updateSummary([]);
            return;
        }

        container.innerHTML = purchases.map(p => `
            <div class="border rounded-lg p-4 hover:shadow transition">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-bold text-lg">${escapeHtml(p.name)} (${escapeHtml(p.brand)})</h3>
                        <p class="text-sm text-gray-600">Batch #${p.batch_id} | Qty: ${p.quantity} | Stock: ${p.remaining_quantity}</p>
                        <p class="text-sm">Cost: ₵${p.cost_price.toFixed(2)} | Discount: ₵${p.discount.toFixed(2)} | Selling: ₵${p.selling_price.toFixed(2)}</p>
                        <p class="text-sm">Total: ₵${p.total_cost.toFixed(2)} | Date: ${formatDate(p.date)}</p>
                    </div>
                    <button onclick="editPurchase(${p.batch_id})" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-1 rounded">✏️ Update</button>
                </div>
            </div>
        `).join('');
        updateSummary(purchases);
    }

    function updateSummary(purchases) {
        let totalQty = 0, totalCost = 0, totalDiscount = 0, totalSelling = 0;
        purchases.forEach(p => {
            totalQty += p.quantity;
            totalCost += p.total_cost;
            totalDiscount += p.discount;
            totalSelling += p.selling_price * p.quantity;
        });
        document.getElementById('summary').innerHTML = `
            Total Qty: ${totalQty} | Total Discount: ₵${totalDiscount.toFixed(2)} | Total Cost: ₵${totalCost.toFixed(2)} | Total Selling: ₵${totalSelling.toFixed(2)}
        `;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleString();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- OFFLINE HELPER FUNCTIONS (should be in offline.js) ----------
    // We'll define them here if they don't exist globally, but they should be in offline.js.
    // We'll check and fallback to local functions.
    function savePendingPurchase(payload, actionType, batchId = null) {
        // This function is expected to be in offline.js, but we'll provide a fallback.
        if (typeof window.savePendingPurchase === 'function') {
            window.savePendingPurchase(payload, actionType, batchId);
            return;
        }
        // Fallback: store in localStorage directly
        const pending = JSON.parse(localStorage.getItem('pendingPurchases') || '[]');
        const entry = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 5),
            type: actionType, // 'add' or 'update'
            batchId: batchId,
            data: payload,
            timestamp: new Date().toISOString()
        };
        pending.push(entry);
        localStorage.setItem('pendingPurchases', JSON.stringify(pending));
        console.log('Purchase saved offline (fallback):', entry);
    }

    function syncPendingPurchases() {
        // Expected in offline.js – if not, do nothing
        if (typeof window.syncPendingPurchases === 'function') {
            window.syncPendingPurchases();
        } else {
            console.warn('syncPendingPurchases not defined; pending purchases will not be synced.');
        }
    }

    function updatePendingBadge() {
        // Expected in offline.js – if not, just update a simple counter
        if (typeof window.updatePendingBadge === 'function') {
            window.updatePendingBadge();
            return;
        }
        // Fallback: count total pending items (sales + purchases)
        const sales = JSON.parse(localStorage.getItem('pendingSales') || '[]');
        const purchases = JSON.parse(localStorage.getItem('pendingPurchases') || '[]');
        const total = sales.length + purchases.length;
        const badge = document.getElementById('pendingBadge');
        if (badge) {
            if (total > 0) {
                badge.textContent = total;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }
    }

    // ========== SUBMIT / UPDATE WITH OFFLINE SUPPORT ==========
    async function submitPurchase() {
        const payload = {
            name: document.getElementById('name').value.trim(),
            brand: document.getElementById('brand').value.trim(),
            category: document.getElementById('category').value.trim(),
            quantity: parseInt(document.getElementById('quantity').value),
            cost_price: parseFloat(document.getElementById('cost_price').value),
            discount: parseFloat(document.getElementById('discount').value) || 0,
            selling_price: parseFloat(document.getElementById('selling_price').value)
        };
        if (!payload.name || !payload.brand || !payload.quantity || !payload.cost_price || !payload.selling_price) {
            alert('Please fill required fields: Name, Brand, Quantity, Cost Price, Selling Price');
            return;
        }

        let url = '/api/purchases';
        let method = 'POST';
        let actionType = 'add';
        if (editMode) {
            url = `/api/purchases/${editBatchId}`;
            method = 'PUT';
            actionType = 'update';
        }

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            const data = await res.json();
            if (data.success) {
                alert(editMode ? 'Purchase updated!' : 'Purchase added!');
                resetForm();
                loadPurchases();
            } else {
                alert('Error: ' + data.error);
            }
        } catch (error) {
            // ===== NETWORK ERROR – OFFLINE STORAGE =====
            console.warn('Network error, saving purchase offline:', error);
            savePendingPurchase(payload, actionType, editMode ? editBatchId : null);
            updatePendingBadge();
            alert('You are offline. Purchase saved locally and will be synced later.');
            // Clear form and reload list (optional)
            resetForm();
            // Optionally, we could add the purchase to the list with a pending flag, but for simplicity we just reload.
            loadPurchases();
        }
    }

    function editPurchase(batchId) {
        const purchase = currentPurchases.find(p => p.batch_id === batchId);
        if (!purchase) return;
        document.getElementById('name').value = purchase.name;
        document.getElementById('brand').value = purchase.brand;
        document.getElementById('category').value = purchase.category;
        document.getElementById('quantity').value = purchase.quantity;
        document.getElementById('cost_price').value = purchase.cost_price;
        document.getElementById('discount').value = purchase.discount;
        document.getElementById('selling_price').value = purchase.selling_price;
        editMode = true;
        editBatchId = batchId;
        document.getElementById('formTitle').innerText = '✏️ Update Purchase';
        document.getElementById('submitBtn').innerHTML = '✏️ Update Purchase';
        document.getElementById('cancelBtn').classList.remove('hidden');
    }

    function resetForm() {
        document.getElementById('name').value = '';
        document.getElementById('brand').value = '';
        document.getElementById('category').value = '';
        document.getElementById('quantity').value = '';
        document.getElementById('cost_price').value = '';
        document.getElementById('discount').value = '';
        document.getElementById('selling_price').value = '';
        editMode = false;
        editBatchId = null;
        document.getElementById('formTitle').innerText = '➕ Add Purchase';
        document.getElementById('submitBtn').innerHTML = '➕ Add Purchase';
        document.getElementById('cancelBtn').classList.add('hidden');
    }

    // Search & filter
    async function filterPurchases() {
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        if (fromDate && toDate) {
            const res = await fetch(`/api/purchases/filter?start_date=${fromDate}&end_date=${toDate}`);
            currentPurchases = await res.json();
        } else {
            await loadPurchases();
        }
        applySearch();
    }

    function applySearch() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        if (!keyword) {
            renderList(currentPurchases);
            return;
        }
        const filtered = currentPurchases.filter(p =>
            (p.name && p.name.toLowerCase().includes(keyword)) ||
            (p.brand && p.brand.toLowerCase().includes(keyword)) ||
            (p.category && p.category.toLowerCase().includes(keyword))
        );
        renderList(filtered);
    }

    // PDF generation
    async function generatePDF() {
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        const purchasesToExport = currentPurchases;

        const res = await fetch('/api/purchases/pdf', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                purchases: purchasesToExport,
                from_date: fromDate,
                to_date: toDate
            })
        });
        if (res.ok) {
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Purchases_${new Date().toISOString().slice(0,19)}.pdf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        } else {
            alert('Failed to generate PDF');
        }
    }

    // Autocomplete for product name
    let nameTimeout, catTimeout;
    async function fetchNameSuggestions() {
        const q = document.getElementById('name').value.trim();
        if (!q) { document.getElementById('nameSuggestions').classList.add('hidden'); return; }
        const res = await fetch(`/api/purchases/suggestions/name?q=${encodeURIComponent(q)}`);
        const suggestions = await res.json();
        const box = document.getElementById('nameSuggestions');
        if (!suggestions.length) { box.classList.add('hidden'); return; }
        box.innerHTML = suggestions.map(s => `<div class="px-3 py-1 hover:bg-gray-100 cursor-pointer" onclick="selectNameSuggestion('${escapeHtml(s.name)}', '${escapeHtml(s.brand)}', '${escapeHtml(s.category)}')">${escapeHtml(s.name)} (${escapeHtml(s.brand)})</div>`).join('');
        box.classList.remove('hidden');
        const rect = document.getElementById('name').getBoundingClientRect();
        box.style.top = rect.bottom + window.scrollY + 'px';
        box.style.left = rect.left + 'px';
        box.style.width = rect.width + 'px';
    }
    window.selectNameSuggestion = function(name, brand, category) {
        document.getElementById('name').value = name;
        document.getElementById('brand').value = brand;
        document.getElementById('category').value = category;
        document.getElementById('nameSuggestions').classList.add('hidden');
    };

    // Autocomplete for category
    async function fetchCategorySuggestions() {
        const q = document.getElementById('category').value.trim();
        if (!q) { document.getElementById('categorySuggestions').classList.add('hidden'); return; }
        const res = await fetch(`/api/purchases/suggestions/category?q=${encodeURIComponent(q)}`);
        const suggestions = await res.json();
        const box = document.getElementById('categorySuggestions');
        if (!suggestions.length) { box.classList.add('hidden'); return; }
        box.innerHTML = suggestions.map(s => `<div class="px-3 py-1 hover:bg-gray-100 cursor-pointer" onclick="selectCategorySuggestion('${escapeHtml(s.category)}')">${escapeHtml(s.category)}</div>`).join('');
        box.classList.remove('hidden');
        const rect = document.getElementById('category').getBoundingClientRect();
        box.style.top = rect.bottom + window.scrollY + 'px';
        box.style.left = rect.left + 'px';
        box.style.width = rect.width + 'px';
    }
    window.selectCategorySuggestion = function(cat) {
        document.getElementById('category').value = cat;
        document.getElementById('categorySuggestions').classList.add('hidden');
    };

    // Event listeners
    document.getElementById('submitBtn').addEventListener('click', submitPurchase);
    document.getElementById('cancelBtn').addEventListener('click', resetForm);
    document.getElementById('filterBtn').addEventListener('click', filterPurchases);
    document.getElementById('pdfBtn').addEventListener('click', generatePDF);
    document.getElementById('searchInput').addEventListener('input', applySearch);
    document.getElementById('name').addEventListener('input', () => { clearTimeout(nameTimeout); nameTimeout = setTimeout(fetchNameSuggestions, 300); });
    document.getElementById('category').addEventListener('input', () => { clearTimeout(catTimeout); catTimeout = setTimeout(fetchCategorySuggestions, 300); });
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#name')) document.getElementById('nameSuggestions').classList.add('hidden');
        if (!e.target.closest('#category')) document.getElementById('categorySuggestions').classList.add('hidden');
    });

    // ---------- On page load: show pending badge ----------
    document.addEventListener('DOMContentLoaded', function() {
        updatePendingBadge();
    });

    // Initial load
    loadPurchases();
</script>
{% endblock %}
