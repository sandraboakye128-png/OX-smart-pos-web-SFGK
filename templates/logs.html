{% extends 'base.html' %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <div>
        <h1 class="text-3xl font-bold text-indigo-600">📋 User Activity Logs</h1>
        <p class="text-gray-500 text-sm mt-1">🔒 Only accessible by system administrator (oxbee)</p>
    </div>
    <div>
        <button onclick="loadLogs()" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">
            🔄 Refresh
        </button>
    </div>
</div>

<!-- Filters -->
<div class="bg-white rounded-xl shadow-md p-4 mb-6">
    <div class="flex flex-wrap gap-4 items-end">
        <div>
            <label class="block text-sm font-medium text-gray-700">Action Filter</label>
            <select id="actionFilter" class="border rounded-lg px-3 py-2">
                <option value="">All Actions</option>
                <option value="login">Login</option>
                <option value="logout">Logout</option>
                <option value="login_failed">Failed Login</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">User</label>
            <select id="userFilter" class="border rounded-lg px-3 py-2">
                <option value="">All Users</option>
            </select>
        </div>
        <button onclick="applyFilters()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">
            🔍 Apply Filters
        </button>
        <button onclick="clearFilters()" class="bg-gray-400 hover:bg-gray-500 text-white px-5 py-2 rounded-lg">
            ✕ Clear
        </button>
    </div>
</div>

<!-- Logs Table -->
<div class="bg-white rounded-xl shadow-md overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead class="bg-gray-100 border-b">
                <tr>
                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-600">Time</th>
                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-600">User</th>
                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-600">Action</th>
                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-600">IP Address</th>
                    <th class="text-left px-4 py-3 text-sm font-semibold text-gray-600">Device</th>
                </tr>
            </thead>
            <tbody id="logsTableBody">
                <tr>
                    <td colspan="5" class="text-center py-8 text-gray-400">Loading logs...</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div id="pagination" class="flex justify-between items-center px-4 py-3 border-t bg-gray-50">
        <span id="totalLogs" class="text-sm text-gray-500">Loading...</span>
        <div class="flex gap-2">
            <button onclick="prevPage()" class="px-3 py-1 border rounded hover:bg-gray-100 disabled:opacity-50" id="prevBtn">Previous</button>
            <span id="pageInfo" class="px-3 py-1 text-sm text-gray-600">Page 1</span>
            <button onclick="nextPage()" class="px-3 py-1 border rounded hover:bg-gray-100 disabled:opacity-50" id="nextBtn">Next</button>
        </div>
    </div>
</div>

<script>
    let currentPage = 1;
    const limit = 50;
    let totalRecords = 0;

    function getActionBadge(action) {
        const badges = {
            'login': '<span class="inline-flex items-center bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-medium">✅ Login</span>',
            'logout': '<span class="inline-flex items-center bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-medium">🚪 Logout</span>',
            'login_failed': '<span class="inline-flex items-center bg-red-100 text-red-800 px-2 py-1 rounded text-xs font-medium">❌ Failed Login</span>'
        };
        return badges[action] || action;
    }

    function formatTimestamp(ts) {
        if (!ts) return 'N/A';
        const date = new Date(ts);
        return date.toLocaleString();
    }

    function truncateUserAgent(ua) {
        if (!ua) return 'N/A';
        if (ua.length > 40) return ua.substring(0, 40) + '...';
        return ua;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function loadLogs() {
        const actionFilter = document.getElementById('actionFilter').value;
        const userFilter = document.getElementById('userFilter').value;
        
        const tbody = document.getElementById('logsTableBody');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-400">Loading logs...</td></tr>';

        try {
            const offset = (currentPage - 1) * limit;
            let url = `/api/user/logs?limit=${limit}&offset=${offset}`;
            if (actionFilter) url += `&action=${actionFilter}`;
            if (userFilter) url += `&user_id=${userFilter}`;

            const res = await fetch(url);
            const data = await res.json();

            if (data.success) {
                totalRecords = data.total;
                renderLogs(data.logs);
                updatePagination();
            } else {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-red-400">Error: ${data.error}</td></tr>`;
            }
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-red-400">Failed to load logs: ${error.message}</td></tr>`;
        }
    }

    function renderLogs(logs) {
        const tbody = document.getElementById('logsTableBody');
        
        if (!logs || logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-400">No logs found.</td></tr>';
            return;
        }

        tbody.innerHTML = logs.map(log => `
            <tr class="border-b hover:bg-gray-50 transition">
                <td class="px-4 py-3 text-sm text-gray-600">${formatTimestamp(log.timestamp)}</td>
                <td class="px-4 py-3 text-sm font-medium text-indigo-600">${escapeHtml(log.username)}</td>
                <td class="px-4 py-3">${getActionBadge(log.action)}</td>
                <td class="px-4 py-3 text-sm text-gray-600">${escapeHtml(log.ip_address || 'N/A')}</td>
                <td class="px-4 py-3 text-sm text-gray-600">${escapeHtml(truncateUserAgent(log.user_agent))}</td>
            </tr>
        `).join('');
    }

    function updatePagination() {
        const totalPages = Math.ceil(totalRecords / limit);
        document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages || 1}`;
        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        document.getElementById('totalLogs').textContent = `Total: ${totalRecords} logs`;
    }

    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            loadLogs();
        }
    }

    function nextPage() {
        currentPage++;
        loadLogs();
    }

    function applyFilters() {
        currentPage = 1;
        loadLogs();
    }

    function clearFilters() {
        document.getElementById('actionFilter').value = '';
        document.getElementById('userFilter').value = '';
        currentPage = 1;
        loadLogs();
    }

    async function loadUsers() {
        try {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const select = document.getElementById('userFilter');
            users.forEach(user => {
                const option = document.createElement('option');
                option.value = user.id;
                option.textContent = `${user.username} (${user.role})`;
                select.appendChild(option);
            });
        } catch (error) {
            console.error('Failed to load users:', error);
        }
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', function() {
        loadUsers();
        loadLogs();
    });
</script>
{% endblock %}
