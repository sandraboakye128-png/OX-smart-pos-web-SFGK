{% extends 'base.html' %}

{% block content %}
<!-- Offline banner -->
<div id="offlineBanner" class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded hidden">
    ⚠️ You are offline – showing cached archive data. Changes will be synced when you reconnect.
</div>

<!-- Header & Filter + Search -->
<div class="flex flex-wrap justify-between items-center gap-4 mb-6">
    <h1 class="text-3xl font-bold text-indigo-600">📁 Product Archive</h1>
    <div class="flex flex-wrap items-center gap-3">
        <div>
            <input type="text" id="searchInput" placeholder="🔍 Search product/brand..." 
                   class="border border-gray-300 rounded-lg px-3 py-2 w-48 md:w-64">
        </div>
        <label class="text-gray-700">Filter:</label>
        <select id="statusFilter" class="border border-gray-300 rounded-lg px-3 py-2 bg-white">
            <option value="ALL">ALL</option>
            <option value="ACTIVE">ACTIVE</option>
            <option value="UPDATED">UPDATED</option>
            <option value="DELETED">DELETED</option>
            <option value="PRODUCT DELETED">PRODUCT DELETED</option>
            <option value="BATCH DELETED">BATCH DELETED</option>
            <option value="PERMANENTLY DELETED">PERMANENTLY DELETED</option>
        </select>
    </div>
</div>

<!-- Archive List -->
<div id="archiveList" class="space-y-4">
    <div class="text-center text-gray-400 py-8">Loading archive data...</div>
</div>

<!-- Modal: View Batches -->
<div id="batchModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-11/12 max-w-2xl max-h-[80vh] overflow-y-auto">
        <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
            <h3 class="text-xl font-bold" id="batchModalTitle">Batches</h3>
            <button onclick="closeBatchModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
        </div>
        <div id="batchList" class="p-4 space-y-3"></div>
        <div class="sticky bottom-0 bg-white p-4 border-t text-right">
            <button onclick="closeBatchModal()" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded">Close</button>
        </div>
    </div>
</div>

<!-- Modal: View Claims -->
<div id="claimsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-11/12 max-w-2xl max-h-[80vh] overflow-y-auto">
        <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
            <h3 class="text-xl font-bold" id="claimsModalTitle">Claims</h3>
            <button onclick="closeClaimsModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
        </div>
        <div id="claimsList" class="p-4 space-y-3"></div>
        <div class="sticky bottom-0 bg-white p-4 border-t text-right">
            <button onclick="closeClaimsModal()" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded">Close</button>
        </div>
    </div>
</div>

<script>
    // ---------- Offline banner ----------
    function updateOfflineBanner() {
        const banner = document.getElementById('offlineBanner');
        if (!navigator.onLine) {
            banner.classList.remove('hidden');
        } else {
            banner.classList.add('hidden');
        }
    }
    window.addEventListener('online', updateOfflineBanner);
    window.addEventListener('offline', updateOfflineBanner);

    // ---------- Caching helpers ----------
    function cacheData(key, data) {
        try {
            localStorage.setItem(key, JSON.stringify({ data, timestamp: Date.now() }));
        } catch(e) {}
    }
    function getCachedData(key, maxAgeMinutes = 60) {
        try {
            const raw = localStorage.getItem(key);
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            const ageMinutes = (Date.now() - parsed.timestamp) / (1000 * 60);
            if (ageMinutes > maxAgeMinutes) return null;
            return parsed.data;
        } catch(e) { return null; }
    }

    // ---------- Main ----------
    let currentArchiveData = [];
    let currentStatus = 'ALL';
    let searchTerm = '';

    // Helper: format currency
    function formatMoney(amount) {
        return '₵' + (parseFloat(amount) || 0).toFixed(2);
    }

    // Helper: escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Get status color
    function getStatusColor(action) {
        const colors = {
            'ACTIVE': '#22C55E',
            'UPDATED': '#F59E0B',
            'DELETED': '#EF4444',
            'PRODUCT DELETED': '#EF4444',
            'BATCH DELETED': '#F87171',
            'PERMANENTLY DELETED': '#6B7280'
        };
        return colors[action] || '#999';
    }

    // Format date for display
    function formatDate(dateStr) {
        if (!dateStr) return '';
        try {
            const d = new Date(dateStr);
            return d.toLocaleString();
        } catch(e) {
            return dateStr;
        }
    }

    // Get claim status color
    function getClaimStatusColor(status) {
        const colors = {
            'active': '#EF4444',
            'resolved': '#22C55E',
            'pending': '#F59E0B'
        };
        return colors[status] || '#6B7280';
    }

    // Load archive data from API or cache
    async function loadArchive() {
        updateOfflineBanner();
        const status = document.getElementById('statusFilter').value;
        currentStatus = status;
        const container = document.getElementById('archiveList');
        container.innerHTML = '<div class="text-center text-gray-400 py-8">Loading archive data...</div>';
        let data = [];
        let fromCache = false;
        const cacheKey = `archive_${status}`;

        try {
            const res = await fetch(`/api/archive?status=${status}`);
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            data = await res.json();
            cacheData(cacheKey, data);
        } catch (error) {
            console.warn('Offline – using cached archive data');
            fromCache = true;
            const cached = getCachedData(cacheKey);
            if (cached) {
                data = cached;
            } else {
                data = [];
            }
        }

        currentArchiveData = data;
        applySearchAndRender();
        if (fromCache) {
            const note = document.createElement('div');
            note.className = 'text-xs text-gray-400 text-center mt-2';
            note.innerText = '⚠️ Data may be outdated (offline)';
            container.appendChild(note);
        }
    }

    // Search + render
    function applySearchAndRender() {
        searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = currentArchiveData;
        if (searchTerm) {
            filtered = currentArchiveData.filter(item => 
                (item.name && item.name.toLowerCase().includes(searchTerm)) ||
                (item.brand && item.brand.toLowerCase().includes(searchTerm))
            );
        }
        renderArchive(filtered);
    }

    // Render cards
    function renderArchive(items) {
        const container = document.getElementById('archiveList');
        if (!items || !items.length) {
            container.innerHTML = '<div class="text-center text-gray-400 py-8">No archive data available.</div>';
            return;
        }

        container.innerHTML = '';
        for (const item of items) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl shadow-md border p-4';

            // Header row with claims badge
            const headerDiv = document.createElement('div');
            headerDiv.className = 'flex justify-between items-start mb-2';
            
            let claimsBadge = '';
            if (item.has_claims && item.total_claimed > 0) {
                claimsBadge = `<span class="ml-2 text-xs bg-red-100 text-red-800 px-2 py-0.5 rounded-full">⚠️ ${item.total_claimed} Claimed</span>`;
            }
            
            headerDiv.innerHTML = `
                <div>
                    <span class="font-bold text-lg text-indigo-700">${escapeHtml(item.name)} (${escapeHtml(item.brand)})</span>
                    ${claimsBadge}
                </div>
                <div>
                    <span class="text-sm font-semibold" style="color: ${getStatusColor(item.action)}">● ${item.action}</span>
                </div>
            `;
            card.appendChild(headerDiv);

            // Details
            const detailsDiv = document.createElement('div');
            detailsDiv.className = 'text-gray-700 text-sm mb-3';
            if (item.action === 'ACTIVE') {
                detailsDiv.innerHTML = `
                    📦 Stock: ${item.stock} | ${formatMoney(item.cost)} | ${formatMoney(item.price)} | 💰 Disc: ${formatMoney(item.discount)} | 📂 ${escapeHtml(item.category)}
                    ${item.has_claims ? `<br><span class="text-red-500">⚠️ ${item.total_claimed} units claimed as faulty</span>` : ''}
                `;
            } else {
                let details = `
                    Category: ${escapeHtml(item.category)} | Stock: ${item.stock}<br>
                    Cost: ${formatMoney(item.cost)} | Selling: ${formatMoney(item.price)} | Discount: ${formatMoney(item.discount)}<br>
                    Date: ${formatDate(item.date)}
                `;
                if (item.action === 'BATCH DELETED' && item.batch_id) {
                    details += `<br>Batch #${item.batch_id} | Original Qty: ${item.batch_quantity} | Remaining at deletion: ${item.batch_remaining}`;
                }
                if (item.action === 'PRODUCT DELETED' && item.product_id) {
                    details += `<br>Product ID: #${item.product_id} | All batches archived`;
                }
                if (item.has_claims) {
                    details += `<br><span class="text-red-500">⚠️ ${item.total_claimed} units were claimed as faulty</span>`;
                }
                detailsDiv.innerHTML = details;
            }
            card.appendChild(detailsDiv);

            // Buttons
            const btnDiv = document.createElement('div');
            btnDiv.className = 'flex justify-end gap-2 flex-wrap';
            
            // View Claims button (if has claims)
            if (item.has_claims && item.claims && item.claims.length > 0) {
                const claimsBtn = document.createElement('button');
                claimsBtn.textContent = `⚠️ View Claims (${item.total_claimed})`;
                claimsBtn.className = 'bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm';
                claimsBtn.onclick = () => viewClaims(item.claims, item.name, item.brand);
                btnDiv.appendChild(claimsBtn);
            }
            
            // View Batches button for ACTIVE items
            if (item.action === 'ACTIVE') {
                const viewBtn = document.createElement('button');
                viewBtn.textContent = '📋 View Batches';
                viewBtn.className = 'bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm';
                viewBtn.onclick = () => viewBatches(item.name, item.brand);
                btnDiv.appendChild(viewBtn);
            }
            
            // Restore button logic
            const canRestore = ['DELETED', 'BATCH DELETED', 'PRODUCT DELETED'].includes(item.action);
            const isPermanent = item.action === 'PERMANENTLY DELETED';
            
            if (isPermanent) {
                const disabledBtn = document.createElement('button');
                disabledBtn.textContent = '❌ Cannot Restore';
                disabledBtn.className = 'bg-gray-400 text-white px-3 py-1 rounded text-sm cursor-not-allowed';
                disabledBtn.disabled = true;
                btnDiv.appendChild(disabledBtn);
            } else if (canRestore && item.id && !item.is_permanent) {
                const restoreBtn = document.createElement('button');
                restoreBtn.textContent = '↻ Restore';
                restoreBtn.className = 'bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-sm';
                restoreBtn.onclick = () => restoreItem(item.id);
                btnDiv.appendChild(restoreBtn);
            } else if (item.action === 'UPDATED') {
                const infoBtn = document.createElement('button');
                infoBtn.textContent = 'ℹ️ Update History';
                infoBtn.className = 'bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded text-sm';
                infoBtn.onclick = () => alert('This is an update history record.\n\nIt tracks changes made to products and cannot be restored.\n\n✅ The actual product is still active in inventory.');
                btnDiv.appendChild(infoBtn);
            }
            
            card.appendChild(btnDiv);
            container.appendChild(card);
        }
    }

    // View Claims modal
    function viewClaims(claims, productName, brand) {
        const modalTitle = document.getElementById('claimsModalTitle');
        const container = document.getElementById('claimsList');
        container.innerHTML = '';
        modalTitle.innerText = `Claims – ${productName} (${brand})`;
        document.getElementById('claimsModal').classList.remove('hidden');

        if (!claims || claims.length === 0) {
            container.innerHTML = '<div class="text-gray-400 text-center py-4">No claims found.</div>';
            return;
        }

        claims.forEach(claim => {
            const div = document.createElement('div');
            div.className = 'border rounded p-3 mb-2';
            const statusColor = getClaimStatusColor(claim.status);
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <span class="font-semibold">Claim #${claim.claim_id}</span>
                        <span class="text-xs ml-2" style="color: ${statusColor}">● ${claim.status}</span>
                    </div>
                    <span class="text-xs text-gray-500">${formatDate(claim.created_at)}</span>
                </div>
                <div class="mt-1">
                    <span class="font-medium">Issue:</span> ${escapeHtml(claim.issue_type)}
                </div>
                <div>
                    <span class="font-medium">Quantity:</span> ${claim.quantity} units
                </div>
                ${claim.batch_id ? `<div><span class="font-medium">Batch:</span> #${claim.batch_id}</div>` : ''}
                ${claim.description ? `<div class="text-sm text-gray-600 mt-1">${escapeHtml(claim.description)}</div>` : ''}
                ${claim.batch_identifier ? `<div class="text-xs text-gray-400 mt-1">Batch Identifier: ${claim.batch_identifier}</div>` : ''}
            `;
            container.appendChild(div);
        });
    }

    function closeClaimsModal() {
        document.getElementById('claimsModal').classList.add('hidden');
    }

    // View batches modal
    async function viewBatches(name, brand) {
        const modalTitle = document.getElementById('batchModalTitle');
        const container = document.getElementById('batchList');
        container.innerHTML = '<div class="text-center text-gray-400 py-4">Loading batches...</div>';
        modalTitle.innerText = `Batches – ${name} (${brand})`;
        document.getElementById('batchModal').classList.remove('hidden');

        const cacheKey = `batches_${name}_${brand}`;
        let batches = [];
        try {
            const res = await fetch(`/api/archive/batches?name=${encodeURIComponent(name)}&brand=${encodeURIComponent(brand)}`);
            if (!res.ok) throw new Error('Failed to load batches');
            batches = await res.json();
            cacheData(cacheKey, batches);
        } catch (error) {
            console.warn('Offline – using cached batches');
            const cached = getCachedData(cacheKey);
            if (cached) batches = cached;
        }

        if (!batches.length) {
            container.innerHTML = '<div class="text-gray-400 text-center py-4">No batches found.</div>';
        } else {
            container.innerHTML = '';
            batches.forEach(b => {
                const div = document.createElement('div');
                div.className = 'border rounded p-2 mb-2';
                const faultyBadge = (b.is_faulty || b.claimed_quantity > 0) 
                    ? `<span class="text-red-500 text-xs font-bold ml-2">⚠️ FAULTY (${b.claimed_quantity || 0} claimed)</span>` 
                    : '';
                div.innerHTML = `
                    <strong>Batch #${b.batch_id}</strong> ${faultyBadge}<br>
                    Qty: ${b.quantity} | Remaining: ${b.remaining_quantity}<br>
                    Cost: ${formatMoney(b.cost_price)} | Selling: ${formatMoney(b.selling_price)} | Disc: ${formatMoney(b.discount)}<br>
                    Date: ${formatDate(b.date)}
                `;
                container.appendChild(div);
            });
        }
    }

    function closeBatchModal() {
        document.getElementById('batchModal').classList.add('hidden');
    }

    // Restore item (requires internet)
    async function restoreItem(archiveId) {
        if (!navigator.onLine) {
            alert('Restoring requires internet. Please connect and try again.');
            return;
        }
        if (!confirm('Are you sure you want to restore this item?\n\n• Product will be added back to inventory\n• Batches will be restored\n• Stock levels will be recalculated')) {
            return;
        }
        try {
            const res = await fetch('/api/archive/restore', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ archive_id: archiveId })
            });
            const data = await res.json();
            if (data.success) {
                alert('Item restored successfully!\n\nIt has been added back to your inventory.');
                loadArchive(); // refresh list
            } else {
                alert('Restore failed: ' + data.error);
            }
        } catch (err) {
            alert('Error: ' + err.message);
        }
    }

    // ---------- Event listeners ----------
    document.getElementById('statusFilter').addEventListener('change', () => loadArchive());
    document.getElementById('searchInput').addEventListener('input', applySearchAndRender);

    // Auto-refresh on reconnect
    window.addEventListener('online', function() {
        loadArchive();
    });

    // Initial load
    loadArchive();
</script>
{% endblock %}
