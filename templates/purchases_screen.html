{% extends 'base.html' %}

{% block content %}
<!-- Offline banner -->
<div id="offlineBanner" class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded hidden">
    ⚠️ You are offline – showing cached screen purchases. New purchases will be saved and synced when you reconnect.
</div>

<!-- Cache banner -->
<div id="cacheBanner" class="mb-4 bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded hidden">
    ⚠️ Showing cached data (last updated: <span id="cacheTimestamp"></span>). 
    <button onclick="refreshData()" class="underline font-bold">Click here to refresh</button>
</div>

<!-- ADD / EDIT FORM -->
<div class="bg-white rounded-xl shadow-md p-6 mb-6">
    <div class="flex items-center gap-2 mb-4">
        <h2 class="text-xl font-bold" id="formTitle">➕ Add Screen Purchase</h2>
        <span class="bg-purple-100 text-purple-800 text-xs font-semibold px-2.5 py-0.5 rounded">Screens Only</span>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-8 gap-3">
        <div>
            <label class="block text-sm font-medium text-gray-700">Product Name</label>
            <input type="text" id="name" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2" autocomplete="off" placeholder="Screen name">
            <div id="nameSuggestions" class="absolute z-10 bg-white border rounded-lg shadow-lg hidden"></div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Brand</label>
            <input type="text" id="brand" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Category</label>
            <input type="text" id="category" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2" autocomplete="off" value="Screen" readonly>
            <div id="categorySuggestions" class="absolute z-10 bg-white border rounded-lg shadow-lg hidden"></div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Quantity</label>
            <input type="number" id="quantity" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Cost Price (₵)</label>
            <input type="number" step="0.01" id="cost_price" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Discount (₵)</label>
            <input type="number" step="0.01" id="discount" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Selling Price (₵)</label>
            <input type="number" step="0.01" id="selling_price" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Source</label>
            <input type="text" id="source" class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="e.g. Supplier, Wholesaler" autocomplete="off">
            <div id="sourceSuggestions" class="absolute z-10 bg-white border rounded-lg shadow-lg hidden"></div>
        </div>
    </div>
    <div class="mt-4 flex gap-3">
        <button id="submitBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-6 py-2 rounded-lg">➕ Add Screen Purchase</button>
        <button id="cancelBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-2 rounded-lg hidden">Cancel Edit</button>
    </div>
</div>

<!-- SEARCH & FILTER BAR -->
<div class="bg-white rounded-xl shadow-md p-4 mb-6 flex flex-wrap gap-4 items-end">
    <div class="flex-1 min-w-[200px]">
        <label class="block text-sm font-medium text-gray-700">Search (name/brand/category/source)</label>
        <input type="text" id="searchInput" placeholder="🔍 Type to filter screens..." class="w-full border border-gray-300 rounded-lg px-3 py-2">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700">From Date</label>
        <input type="date" id="fromDate" class="border border-gray-300 rounded-lg px-3 py-2">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700">To Date</label>
        <input type="date" id="toDate" class="border border-gray-300 rounded-lg px-3 py-2">
    </div>
    <button id="filterBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">🔍 Filter</button>
    <button id="clearFilterBtn" class="bg-gray-400 hover:bg-gray-500 text-white px-5 py-2 rounded-lg">✕ Clear</button>
    <button id="pdfBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-5 py-2 rounded-lg">🧾 PDF Report</button>
    <button id="viewPendingBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded-lg flex items-center gap-2">
        <span>⏳ Pending</span>
        <span id="pendingCount" class="bg-red-500 text-white text-xs rounded-full px-2 py-0.5 hidden">0</span>
    </button>
</div>

<!-- PURCHASES LIST (scrollable) -->
<div class="bg-white rounded-xl shadow-md p-4">
    <div id="purchasesList" class="max-h-[500px] overflow-y-auto space-y-3">
        <!-- dynamically loaded -->
    </div>
    <div id="summary" class="mt-4 p-3 bg-gray-50 rounded-lg font-bold text-center text-teal-700"></div>
</div>

<!-- PENDING PURCHASES MODAL -->
<div id="pendingModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-11/12 max-w-4xl max-h-[90vh] overflow-y-auto">
        <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
            <h3 class="text-xl font-bold">⏳ Pending Screen Purchases</h3>
            <button onclick="closePendingModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
        </div>
        <div id="pendingList" class="p-4 space-y-3">
            <!-- dynamically loaded -->
        </div>
        <div class="sticky bottom-0 bg-white p-4 border-t flex justify-between">
            <div>
                <button onclick="syncAllPending()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
                    🔄 Sync All
                </button>
                <button onclick="clearAllPending()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded ml-2">
                    🗑️ Clear All
                </button>
            </div>
            <button onclick="closePendingModal()" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded">Close</button>
        </div>
    </div>
</div>

<script>
    // ---------- Offline banner helpers ----------
    function updateOfflineBanner() {
        const banner = document.getElementById('offlineBanner');
        if (!navigator.onLine) {
            banner.classList.remove('hidden');
        } else {
            banner.classList.add('hidden');
        }
    }
    window.addEventListener('online', updateOfflineBanner);
    window.addEventListener('offline', updateOfflineBanner);

    // ---------- Main variables ----------
    let currentPurchases = [];
    let currentFilteredData = [];  // ✅ NEW: Track filtered data for PDF
    let editMode = false;
    let editBatchId = null;
    let isDataFresh = false;
    const CACHE_KEY = 'cached_purchases_screen';
    const CACHE_TIMESTAMP_KEY = 'cached_purchases_screen_timestamp';

    // ---------- Helper functions ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleString();
    }

    function formatMoney(amount) {
        return '₵' + (parseFloat(amount) || 0).toFixed(2);
    }

    // ---------- Caching ----------
    function getCacheTimestamp() {
        try {
            return localStorage.getItem(CACHE_TIMESTAMP_KEY);
        } catch (e) {
            return null;
        }
    }

    function cachePurchases(purchases) {
        try {
            localStorage.setItem(CACHE_KEY, JSON.stringify(purchases));
            localStorage.setItem(CACHE_TIMESTAMP_KEY, new Date().toISOString());
            isDataFresh = true;
        } catch (e) {}
    }

    function loadCachedPurchases() {
        try {
            const raw = localStorage.getItem(CACHE_KEY);
            if (!raw) return null;
            return JSON.parse(raw);
        } catch (e) {
            return null;
        }
    }

    function updateCacheBanner() {
        const cacheBanner = document.getElementById('cacheBanner');
        const timestampSpan = document.getElementById('cacheTimestamp');
        
        if (navigator.onLine && !isDataFresh) {
            const cached = loadCachedPurchases();
            if (cached && cached.length > 0) {
                const ts = getCacheTimestamp();
                if (ts) {
                    const date = new Date(ts);
                    timestampSpan.innerText = date.toLocaleString();
                } else {
                    timestampSpan.innerText = 'unknown time';
                }
                cacheBanner.classList.remove('hidden');
            } else {
                cacheBanner.classList.add('hidden');
            }
        } else {
            cacheBanner.classList.add('hidden');
        }
    }

    window.refreshData = function() {
        loadPurchases(true);
    };

    // ---------- PENDING PURCHASES MANAGEMENT ----------
    function getPendingPurchases() {
        try {
            return JSON.parse(localStorage.getItem('pendingPurchases') || '[]');
        } catch (e) {
            return [];
        }
    }

    function savePendingPurchases(pending) {
        try {
            localStorage.setItem('pendingPurchases', JSON.stringify(pending));
        } catch (e) {}
    }

    function updatePendingBadge() {
        const pending = getPendingPurchases();
        const count = pending.length;
        const badge = document.getElementById('pendingCount');
        if (badge) {
            badge.textContent = count;
            if (count === 0) {
                badge.classList.add('hidden');
            } else {
                badge.classList.remove('hidden');
            }
        }
    }

    function viewPendingPurchases() {
        const pending = getPendingPurchases();
        const container = document.getElementById('pendingList');
        const modal = document.getElementById('pendingModal');
        
        if (pending.length === 0) {
            container.innerHTML = `
                <div class="text-center text-gray-400 py-8">
                    <p class="text-2xl mb-2">📭</p>
                    <p>No pending screen purchases.</p>
                    <p class="text-sm">All purchases have been synced to the server.</p>
                </div>
            `;
        } else {
            container.innerHTML = pending.map((p, index) => `
                <div class="border rounded-lg p-4 hover:shadow transition">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-semibold ${p.type === 'add' ? 'text-green-600' : 'text-yellow-600'}">
                                    ${p.type === 'add' ? '➕ Add' : '✏️ Update'}
                                </span>
                                <span class="text-xs text-gray-400">${new Date(p.timestamp).toLocaleString()}</span>
                                ${p.batchId ? `<span class="text-xs bg-gray-100 px-2 py-0.5 rounded">Batch #${p.batchId}</span>` : ''}
                            </div>
                            <h3 class="font-bold text-lg mt-1">${escapeHtml(p.data.name)} (${escapeHtml(p.data.brand)})</h3>
                            <p class="text-sm text-gray-600">
                                Qty: ${p.data.quantity} | 
                                Cost: ₵${p.data.cost_price.toFixed(2)} | 
                                Selling: ₵${p.data.selling_price.toFixed(2)}
                                ${p.data.discount ? `| Discount: ₵${p.data.discount.toFixed(2)}` : ''}
                            </p>
                            <p class="text-sm text-gray-500">Category: ${p.data.category || 'Screen'}</p>
                            <p class="text-sm text-gray-500">Source: ${p.data.source || 'Unknown'}</p>
                        </div>
                        <div class="flex flex-col gap-1">
                            <button onclick="syncPendingItem(${index})" class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-sm">
                                🔄 Sync
                            </button>
                            <button onclick="removePendingItem(${index})" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm">
                                🗑️ Remove
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        updatePendingBadge();
        modal.classList.remove('hidden');
    }

    function closePendingModal() {
        document.getElementById('pendingModal').classList.add('hidden');
    }

    async function syncPendingItem(index) {
        const pending = getPendingPurchases();
        const item = pending[index];
        if (!item) return;
        
        const confirmMsg = `Sync this ${item.type === 'add' ? 'addition' : 'update'} for "${item.data.name}"?`;
        if (!confirm(confirmMsg)) return;
        
        try {
            let url = '/api/purchases';
            let method = 'POST';
            
            if (item.type === 'update' && item.batchId) {
                url = `/api/purchases/${item.batchId}`;
                method = 'PUT';
            }
            
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(item.data)
            });
            
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            const data = await res.json();
            
            if (data.success) {
                pending.splice(index, 1);
                savePendingPurchases(pending);
                updatePendingBadge();
                viewPendingPurchases();
                loadPurchases(true);
                alert(`✅ ${item.type === 'add' ? 'Added' : 'Updated'} successfully!`);
            } else {
                alert('Error: ' + data.error);
            }
        } catch (error) {
            alert('❌ Failed to sync: ' + error.message);
        }
    }

    async function syncAllPending() {
        const pending = getPendingPurchases();
        if (pending.length === 0) {
            alert('No pending items to sync.');
            return;
        }
        
        if (!confirm(`Sync all ${pending.length} pending purchase(s)?`)) return;
        
        let successCount = 0;
        let failCount = 0;
        
        for (let i = pending.length - 1; i >= 0; i--) {
            const item = pending[i];
            try {
                let url = '/api/purchases';
                let method = 'POST';
                
                if (item.type === 'update' && item.batchId) {
                    url = `/api/purchases/${item.batchId}`;
                    method = 'PUT';
                }
                
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(item.data)
                });
                
                if (res.ok) {
                    const data = await res.json();
                    if (data.success) {
                        pending.splice(i, 1);
                        successCount++;
                    } else {
                        failCount++;
                    }
                } else {
                    failCount++;
                }
            } catch (error) {
                failCount++;
            }
        }
        
        savePendingPurchases(pending);
        updatePendingBadge();
        viewPendingPurchases();
        loadPurchases(true);
        
        alert(`✅ Synced: ${successCount} | ❌ Failed: ${failCount}`);
    }

    function removePendingItem(index) {
        const pending = getPendingPurchases();
        const item = pending[index];
        if (!confirm(`Remove pending ${item.type === 'add' ? 'addition' : 'update'} for "${item.data.name}"?`)) return;
        
        pending.splice(index, 1);
        savePendingPurchases(pending);
        updatePendingBadge();
        viewPendingPurchases();
    }

    function clearAllPending() {
        const pending = getPendingPurchases();
        if (pending.length === 0) {
            alert('No pending items to clear.');
            return;
        }
        if (!confirm(`Delete all ${pending.length} pending purchase(s)? This cannot be undone.`)) return;
        
        savePendingPurchases([]);
        updatePendingBadge();
        viewPendingPurchases();
    }

    // ---------- Check for batch edit from URL ----------
    function checkForBatchEdit() {
        const urlParams = new URLSearchParams(window.location.search);
        const batchId = urlParams.get('edit_batch');
        if (batchId) {
            console.log('🔍 Batch edit requested for:', batchId);
            
            setTimeout(function() {
                const purchase = currentPurchases.find(p => p.batch_id === parseInt(batchId));
                if (purchase) {
                    console.log('✅ Found purchase:', purchase);
                    editPurchase(parseInt(batchId));
                    const form = document.querySelector('.bg-white.rounded-xl.shadow-md.p-6.mb-6');
                    if (form) {
                        form.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        form.style.border = '3px solid #f59e0b';
                        form.style.transition = 'border-color 0.5s';
                        setTimeout(() => {
                            form.style.border = 'none';
                        }, 3000);
                    }
                } else {
                    console.warn('⚠️ Batch #' + batchId + ' not found');
                    alert('Batch #' + batchId + ' not found. It may have been deleted.');
                }
            }, 1500);
        }
    }

    // ---------- Load purchases (filtered to screens) ----------
    async function loadPurchases(forceRefresh = false) {
        updateOfflineBanner();
        
        if (forceRefresh) {
            isDataFresh = false;
        }
        
        let purchases = [];
        let fromCache = false;

        if (navigator.onLine) {
            try {
                const res = await fetch('/api/purchases?category=Screen');
                if (res.ok) {
                    purchases = await res.json();
                    cachePurchases(purchases);
                    isDataFresh = true;
                    currentFilteredData = purchases;  // ✅ Store loaded data
                    console.log('✅ Data loaded from API (fresh)');
                    
                    const pending = getPendingPurchases();
                    if (pending.length > 0) {
                        console.log(`📦 ${pending.length} pending purchases found - syncing automatically...`);
                        await syncAllPendingSilently();
                    }
                } else {
                    throw new Error('API returned error');
                }
            } catch (err) {
                console.warn('⚠️ API failed, using cached data:', err.message);
                fromCache = true;
                const cached = loadCachedPurchases();
                if (cached) {
                    purchases = cached;
                    currentFilteredData = cached;  // ✅ Store cached data
                    isDataFresh = false;
                } else {
                    purchases = [];
                    currentFilteredData = [];
                    isDataFresh = false;
                }
            }
        } else {
            fromCache = true;
            const cached = loadCachedPurchases();
            if (cached) {
                purchases = cached;
                currentFilteredData = cached;  // ✅ Store cached data
                isDataFresh = false;
            } else {
                purchases = [];
                currentFilteredData = [];
                isDataFresh = false;
            }
        }

        currentPurchases = purchases;
        renderList(currentPurchases, fromCache);
        updateCacheBanner();
        updatePendingBadge();
        
        checkForBatchEdit();
    }

    async function syncAllPendingSilently() {
        const pending = getPendingPurchases();
        if (pending.length === 0) return;
        
        let successCount = 0;
        let failCount = 0;
        
        for (let i = pending.length - 1; i >= 0; i--) {
            const item = pending[i];
            try {
                let url = '/api/purchases';
                let method = 'POST';
                
                if (item.type === 'update' && item.batchId) {
                    url = `/api/purchases/${item.batchId}`;
                    method = 'PUT';
                }
                
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(item.data)
                });
                
                if (res.ok) {
                    const data = await res.json();
                    if (data.success) {
                        pending.splice(i, 1);
                        successCount++;
                    } else {
                        failCount++;
                    }
                } else {
                    failCount++;
                }
            } catch (error) {
                failCount++;
            }
        }
        
        if (successCount > 0 || failCount > 0) {
            savePendingPurchases(pending);
            updatePendingBadge();
            console.log(`📦 Sync results: ${successCount} success, ${failCount} failed`);
        }
    }

    // ---------- Render list ----------
    function renderList(purchases, fromCache = false) {
        const container = document.getElementById('purchasesList');
        if (!purchases.length) {
            container.innerHTML = '<div class="text-center text-gray-400 py-8">No screen purchase records found.</div>';
            updateSummary([]);
            return;
        }

        container.innerHTML = purchases.map(p => `
            <div class="border rounded-lg p-4 hover:shadow transition">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">${escapeHtml(p.name)} (${escapeHtml(p.brand)})</h3>
                        <p class="text-sm text-gray-600">Batch #${p.batch_id} | Qty: ${p.quantity} | Stock: ${p.remaining_quantity}</p>
                        <p class="text-sm">Cost: ₵${p.cost_price.toFixed(2)} | Discount: ₵${p.discount.toFixed(2)} | Selling: ₵${p.selling_price.toFixed(2)}</p>
                        <p class="text-sm">Total: ₵${p.total_cost.toFixed(2)} | Date: ${formatDate(p.date)}</p>
                        <p class="text-sm text-gray-500 mt-1"><span class="font-medium">Source:</span> ${escapeHtml(p.source || 'Unknown')}</p>
                    </div>
                    <button onclick="editPurchase(${p.batch_id})" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-1 rounded ml-2">✏️ Update</button>
                </div>
            </div>
        `).join('');
        updateSummary(purchases);
    }

    // ---------- Update summary ----------
    function updateSummary(purchases) {
        let totalQty = 0;
        let totalCost = 0;
        let totalDiscount = 0;
        let totalSelling = 0;
        let totalProfit = 0;
        let totalCapital = 0;
        const totalBatches = purchases.length;
        
        purchases.forEach(p => {
            const itemQty = p.quantity || 0;
            const itemCost = p.cost_price || 0;
            const itemSelling = p.selling_price || 0;
            const itemDiscount = p.discount || 0;
            
            totalQty += itemQty;
            totalCost += p.total_cost || (itemCost * itemQty);
            totalDiscount += itemDiscount;
            totalSelling += itemSelling * itemQty;
            
            const itemProfit = (itemSelling - itemCost) * itemQty - itemDiscount;
            totalProfit += itemProfit;
            totalCapital += (itemCost * itemQty) - itemDiscount;
        });
        
        const isOffline = !navigator.onLine;
        const isCached = !isDataFresh && !isOffline;
        
        document.getElementById('summary').innerHTML = `
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 text-sm">
                <div class="bg-white rounded p-2 shadow">
                    <span class="text-gray-500">📦 Batches</span><br>
                    <span class="text-lg font-bold text-indigo-600">${totalBatches}</span>
                </div>
                <div class="bg-white rounded p-2 shadow">
                    <span class="text-gray-500">🧾 Total Qty</span><br>
                    <span class="text-lg font-bold text-blue-600">${totalQty}</span>
                </div>
                <div class="bg-white rounded p-2 shadow">
                    <span class="text-gray-500">💰 Capital</span><br>
                    <span class="text-lg font-bold text-purple-600">${formatMoney(totalCapital)}</span>
                </div>
                <div class="bg-white rounded p-2 shadow">
                    <span class="text-gray-500">📈 Total Selling</span><br>
                    <span class="text-lg font-bold text-green-600">${formatMoney(totalSelling)}</span>
                </div>
                <div class="bg-white rounded p-2 shadow">
                    <span class="text-gray-500">📉 Total Discount</span><br>
                    <span class="text-lg font-bold text-red-600">${formatMoney(totalDiscount)}</span>
                </div>
                <div class="bg-white rounded p-2 shadow">
                    <span class="text-gray-500">💎 Profit</span><br>
                    <span class="text-lg font-bold ${totalProfit >= 0 ? 'text-teal-600' : 'text-red-600'}">${formatMoney(totalProfit)}</span>
                </div>
            </div>
            <div class="mt-2 text-xs text-gray-400">
                ${isOffline ? '⚠️ Offline mode' : ''}
                ${isCached ? '📦 Showing cached data' : ''}
                ${!isOffline && !isCached ? '✅ Live data' : ''}
            </div>
        `;
    }

    // ---------- Save pending purchase ----------
    function savePendingPurchase(payload, actionType, batchId) {
        let pending = getPendingPurchases();
        pending.push({
            id: Date.now() + '_' + Math.random().toString(36).substr(2,5),
            type: actionType || 'add',
            batchId: batchId || null,
            data: payload,
            timestamp: new Date().toISOString()
        });
        savePendingPurchases(pending);
        updatePendingBadge();
        console.log('💾 Saved pending screen purchase:', payload);
    }

    // ---------- Submit / Update ----------
    async function submitPurchase() {
        const payload = {
            name: document.getElementById('name').value.trim(),
            brand: document.getElementById('brand').value.trim(),
            category: document.getElementById('category').value.trim() || 'Screen',
            quantity: parseInt(document.getElementById('quantity').value),
            cost_price: parseFloat(document.getElementById('cost_price').value),
            discount: parseFloat(document.getElementById('discount').value) || 0,
            selling_price: parseFloat(document.getElementById('selling_price').value),
            source: document.getElementById('source').value.trim() || 'Unknown'
        };
        
        if (!payload.name || !payload.brand || !payload.quantity || !payload.cost_price || !payload.selling_price) {
            alert('Please fill required fields: Name, Brand, Quantity, Cost Price, Selling Price');
            return;
        }

        let url = '/api/purchases';
        let method = 'POST';
        let actionType = 'add';
        let batchId = null;
        
        if (editMode) {
            url = `/api/purchases/${editBatchId}`;
            method = 'PUT';
            actionType = 'update';
            batchId = editBatchId;
            console.log('✏️ Updating screen batch:', editBatchId, payload);
        } else {
            console.log('➕ Adding new screen purchase:', payload);
        }

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (!res.ok) {
                const errorData = await res.json();
                throw new Error(errorData.error || `HTTP error! status: ${res.status}`);
            }
            
            const data = await res.json();
            
            if (data.success) {
                alert(editMode ? '✅ Screen purchase updated!' : '✅ Screen purchase added!');
                resetForm();
                
                if (window.history && window.history.pushState) {
                    const newUrl = window.location.pathname;
                    window.history.pushState({}, '', newUrl);
                }
                
                loadPurchases(true);
            } else {
                alert('Error: ' + data.error);
            }
        } catch (error) {
            console.warn('Network error, saving screen purchase offline:', error);
            savePendingPurchase(payload, actionType, batchId);
            updatePendingBadge();
            alert('⚠️ You are offline. Screen purchase saved locally and will be synced later.');
            resetForm();
            loadPurchases();
        }
    }

    // ---------- Edit / Reset ----------
    function editPurchase(batchId) {
        console.log('✏️ Editing screen purchase:', batchId);
        const purchase = currentPurchases.find(p => p.batch_id === batchId);
        if (!purchase) {
            console.warn('Purchase not found:', batchId);
            return;
        }
        
        console.log('📦 Purchase data:', purchase);
        
        document.getElementById('name').value = purchase.name;
        document.getElementById('brand').value = purchase.brand;
        document.getElementById('category').value = purchase.category || 'Screen';
        document.getElementById('quantity').value = purchase.quantity;
        document.getElementById('cost_price').value = purchase.cost_price;
        document.getElementById('discount').value = purchase.discount;
        document.getElementById('selling_price').value = purchase.selling_price;
        document.getElementById('source').value = purchase.source || 'Unknown';
        
        editMode = true;
        editBatchId = batchId;
        
        document.getElementById('formTitle').innerHTML = '✏️ Update Screen Purchase <span class="bg-purple-100 text-purple-800 text-xs font-semibold px-2.5 py-0.5 rounded">Screens Only</span>';
        document.getElementById('submitBtn').innerHTML = '✏️ Update Screen Purchase';
        document.getElementById('cancelBtn').classList.remove('hidden');
        
        const form = document.querySelector('.bg-white.rounded-xl.shadow-md.p-6.mb-6');
        if (form) {
            form.scrollIntoView({ behavior: 'smooth', block: 'start' });
            form.style.border = '3px solid #f59e0b';
            form.style.transition = 'border-color 0.5s';
            setTimeout(() => {
                form.style.border = 'none';
            }, 3000);
        }
    }

    function resetForm() {
        document.getElementById('name').value = '';
        document.getElementById('brand').value = '';
        document.getElementById('category').value = 'Screen';
        document.getElementById('quantity').value = '';
        document.getElementById('cost_price').value = '';
        document.getElementById('discount').value = '';
        document.getElementById('selling_price').value = '';
        document.getElementById('source').value = '';
        
        editMode = false;
        editBatchId = null;
        
        document.getElementById('formTitle').innerHTML = '➕ Add Screen Purchase <span class="bg-purple-100 text-purple-800 text-xs font-semibold px-2.5 py-0.5 rounded">Screens Only</span>';
        document.getElementById('submitBtn').innerHTML = '➕ Add Screen Purchase';
        document.getElementById('cancelBtn').classList.add('hidden');
        
        const form = document.querySelector('.bg-white.rounded-xl.shadow-md.p-6.mb-6');
        if (form) {
            form.style.border = 'none';
        }
        
        if (window.history && window.history.pushState) {
            const newUrl = window.location.pathname;
            window.history.pushState({}, '', newUrl);
        }
    }

    // ---------- Search & Filter ----------
    async function filterPurchases() {
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        
        if (fromDate && toDate) {
            try {
                const res = await fetch(`/api/purchases/filter?start_date=${fromDate}&end_date=${toDate}&category=Screen`);
                if (!res.ok) throw new Error();
                currentPurchases = await res.json();
                currentFilteredData = currentPurchases;  // ✅ Store filtered data
                cachePurchases(currentPurchases);
                isDataFresh = true;
                updateCacheBanner();
            } catch (err) {
                alert('Filter is unavailable offline. Showing cached data.');
                const cached = loadCachedPurchases();
                if (cached) {
                    currentPurchases = cached;
                    currentFilteredData = cached;  // ✅ Store cached data
                }
                isDataFresh = false;
                updateCacheBanner();
            }
        } else {
            await loadPurchases();
            currentFilteredData = currentPurchases;  // ✅ Store all data
        }
        applySearch();  // This will filter further if search term exists
    }

    function clearFilters() {
        document.getElementById('fromDate').value = '';
        document.getElementById('toDate').value = '';
        document.getElementById('searchInput').value = '';
        currentFilteredData = currentPurchases;  // ✅ Reset filtered data
        loadPurchases(true);
    }

    function applySearch() {
        const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
        if (!keyword) {
            currentFilteredData = currentPurchases;  // ✅ Store all data
            renderList(currentPurchases, !isDataFresh);
            return;
        }
        const filtered = currentPurchases.filter(p =>
            (p.name && p.name.toLowerCase().includes(keyword)) ||
            (p.brand && p.brand.toLowerCase().includes(keyword)) ||
            (p.category && p.category.toLowerCase().includes(keyword)) ||
            (p.source && p.source.toLowerCase().includes(keyword))
        );
        currentFilteredData = filtered;  // ✅ Store filtered data
        renderList(filtered, !isDataFresh);
    }

    // ---------- PDF with Enhanced Summary ----------
    async function generatePDF() {
        if (!navigator.onLine) {
            alert('PDF generation requires internet. Please connect and try again.');
            return;
        }
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        
        // ✅ Get current displayed data (after search/filter)
        const purchasesToExport = currentFilteredData;
        
        if (!purchasesToExport || purchasesToExport.length === 0) {
            alert('No data to export. Please adjust your filters.');
            return;
        }

        // Calculate totals for the report
        let totalQty = 0;
        let totalCost = 0;
        let totalDiscount = 0;
        let totalSelling = 0;
        let totalProfit = 0;
        let totalCapital = 0;
        
        purchasesToExport.forEach(p => {
            const itemQty = p.quantity || 0;
            const itemCost = p.cost_price || 0;
            const itemSelling = p.selling_price || 0;
            const itemDiscount = p.discount || 0;
            
            totalQty += itemQty;
            totalCost += p.total_cost || (itemCost * itemQty);
            totalDiscount += itemDiscount;
            totalSelling += itemSelling * itemQty;
            
            const itemProfit = (itemSelling - itemCost) * itemQty - itemDiscount;
            totalProfit += itemProfit;
            totalCapital += (itemCost * itemQty) - itemDiscount;
        });

        try {
            const res = await fetch('/api/purchases/pdf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    purchases: purchasesToExport,  // ✅ Send filtered data
                    from_date: fromDate,
                    to_date: toDate,
                    totals: {
                        total_qty: totalQty,
                        total_cost: totalCost,
                        total_discount: totalDiscount,
                        total_selling: totalSelling,
                        total_profit: totalProfit,
                        total_capital: totalCapital,
                        total_batches: purchasesToExport.length
                    }
                })
            });
            if (!res.ok) throw new Error();
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Screen_Purchases_${new Date().toISOString().slice(0,19)}.pdf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        } catch (err) {
            alert('Failed to generate PDF. Please try again.');
        }
    }

    // ---------- Autocomplete ----------
    let nameTimeout, catTimeout, sourceTimeout;

    async function fetchNameSuggestions() {
        if (!navigator.onLine) {
            document.getElementById('nameSuggestions').classList.add('hidden');
            return;
        }
        const q = document.getElementById('name').value.trim();
        if (!q) { document.getElementById('nameSuggestions').classList.add('hidden'); return; }
        try {
            const res = await fetch(`/api/purchases/suggestions/name?q=${encodeURIComponent(q)}&category=Screen`);
            if (!res.ok) throw new Error();
            const suggestions = await res.json();
            const box = document.getElementById('nameSuggestions');
            if (!suggestions.length) { box.classList.add('hidden'); return; }
            box.innerHTML = suggestions.map(s => `<div class="px-3 py-1 hover:bg-gray-100 cursor-pointer" onclick="selectNameSuggestion('${escapeHtml(s.name)}', '${escapeHtml(s.brand)}', '${escapeHtml(s.category)}')">${escapeHtml(s.name)} (${escapeHtml(s.brand)})</div>`).join('');
            box.classList.remove('hidden');
            const rect = document.getElementById('name').getBoundingClientRect();
            box.style.top = rect.bottom + window.scrollY + 'px';
            box.style.left = rect.left + 'px';
            box.style.width = rect.width + 'px';
        } catch (err) {
            document.getElementById('nameSuggestions').classList.add('hidden');
        }
    }

    async function fetchCategorySuggestions() {
        if (!navigator.onLine) {
            document.getElementById('categorySuggestions').classList.add('hidden');
            return;
        }
        const q = document.getElementById('category').value.trim();
        if (!q) { document.getElementById('categorySuggestions').classList.add('hidden'); return; }

            const res = await fetch(`/api/purchases/suggestions/category?q=${encodeURIComponent(q)}&category=Screen`);
            if (!res.ok) throw new Error();

            const box = document.getElementById('categorySuggestions');
            if (!suggestions.length) { box.classList.add('hidden'); return; }
            box.innerHTML = suggestions.map(s => `<div class="px-3 py-1 hover:bg-gray-100 cursor-pointer" onclick="selectCategorySuggestion('${escapeHtml(s.category)}')">${escapeHtml(s.category)}</div>`).join('');
            box.classList.remove('hidden');
            const rect = document.getElementById('category').getBoundingClientRect();
            box.style.top = rect.bottom + window.scrollY + 'px';
            box.style.left = rect.left + 'px';
            box.style.width = rect.width + 'px';
        } catch (err) {
            document.getElementById('categorySuggestions').classList.add('hidden');
        }
    }

    async function fetchSourceSuggestions() {
        if (!navigator.onLine) {
            document.getElementById('sourceSuggestions').classList.add('hidden');
            return;
        }
        const q = document.getElementById('source').value.trim();
        if (!q) { document.getElementById('sourceSuggestions').classList.add('hidden'); return; }
        try {
            const res = await fetch(`/api/purchases/suggestions/source?q=${encodeURIComponent(q)}`);
            if (!res.ok) throw new Error();
            const suggestions = await res.json();
            const box = document.getElementById('sourceSuggestions');
            if (!suggestions.length) { box.classList.add('hidden'); return; }
            box.innerHTML = suggestions.map(s => `<div class="px-3 py-1 hover:bg-gray-100 cursor-pointer" onclick="selectSourceSuggestion('${escapeHtml(s.source)}')">${escapeHtml(s.source)}</div>`).join('');
            box.classList.remove('hidden');
            const rect = document.getElementById('source').getBoundingClientRect();
            box.style.top = rect.bottom + window.scrollY + 'px';
            box.style.left = rect.left + 'px';
            box.style.width = rect.width + 'px';
        } catch (err) {
            document.getElementById('sourceSuggestions').classList.add('hidden');
        }
    }

    window.selectNameSuggestion = function(name, brand, category) {
        document.getElementById('name').value = name;
        document.getElementById('brand').value = brand;
        document.getElementById('category').value = category || 'Screen';
        document.getElementById('nameSuggestions').classList.add('hidden');
    };

    window.selectCategorySuggestion = function(cat) {
        document.getElementById('category').value = cat;
        document.getElementById('categorySuggestions').classList.add('hidden');
    };

    window.selectSourceSuggestion = function(source) {
        document.getElementById('source').value = source;
        document.getElementById('sourceSuggestions').classList.add('hidden');
    };

    // ---------- Event listeners ----------
    document.addEventListener('DOMContentLoaded', function() {
        loadPurchases();
        if (typeof updatePendingBadge === 'function') updatePendingBadge();
        
        // View Pending button
        const viewPendingBtn = document.getElementById('viewPendingBtn');
        if (viewPendingBtn) {
            viewPendingBtn.addEventListener('click', viewPendingPurchases);
        }
        
        // Submit button
        document.getElementById('submitBtn').addEventListener('click', submitPurchase);
        document.getElementById('cancelBtn').addEventListener('click', resetForm);
        document.getElementById('filterBtn').addEventListener('click', filterPurchases);
        document.getElementById('clearFilterBtn').addEventListener('click', clearFilters);
        document.getElementById('pdfBtn').addEventListener('click', generatePDF);
        document.getElementById('searchInput').addEventListener('input', applySearch);
        
        // Autocomplete listeners
        document.getElementById('name').addEventListener('input', () => { 
            clearTimeout(nameTimeout); 
            nameTimeout = setTimeout(fetchNameSuggestions, 300); 
        });
        document.getElementById('category').addEventListener('input', () => { 
            clearTimeout(catTimeout); 
            catTimeout = setTimeout(fetchCategorySuggestions, 300); 
        });
        document.getElementById('source').addEventListener('input', () => { 
            clearTimeout(sourceTimeout); 
            sourceTimeout = setTimeout(fetchSourceSuggestions, 300); 
        });
        
        // Close suggestions on click outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#name')) document.getElementById('nameSuggestions').classList.add('hidden');
            if (!e.target.closest('#category')) document.getElementById('categorySuggestions').classList.add('hidden');
            if (!e.target.closest('#source')) document.getElementById('sourceSuggestions').classList.add('hidden');
        });
    });

    // Auto-refresh on reconnect
    window.addEventListener('online', function() {
        loadPurchases(true);
    });

</script>
