{% extends 'base.html' %}

{% block content %}
<!-- Offline banner -->
<div id="offlineBanner" class="fixed top-0 left-0 w-full bg-red-500 text-white text-center py-2 z-50 hidden">
    ⚠️ You are offline – cannot sign up. Please connect to the internet.
</div>

<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-bold text-indigo-600">📝 Create Account</h2>
            <p class="text-gray-500 mt-1">Sign up to continue</p>
        </div>
        
        <form id="signupForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">👤 Username</label>
                <input type="text" id="username" name="username" required autocomplete="off"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">🔒 Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <p class="text-xs text-gray-500 mt-1">Password must be at least 4 characters</p>
            </div>
            <div class="mb-4">
                <label class="flex items-center">
                    <input type="checkbox" id="showPassword" class="mr-2">
                    <span class="text-sm text-gray-600">👁 Show Password</span>
                </label>
            </div>
            <div id="roleContainer" class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">🛡 Role</label>
                <select id="role" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <p id="roleNote" class="text-xs text-gray-500 mt-1"></p>
            </div>
            <button type="submit" id="signupBtn" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-2 px-4 rounded-lg transition">
                ✅ Register
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-gray-600">Already have an account? 
                <a href="/login" class="text-indigo-600 hover:underline">Login</a>
            </p>
        </div>
    </div>
</div>

<script>
    // ----- OFFLINE BANNER -----
    function updateOfflineBanner() {
        const banner = document.getElementById('offlineBanner');
        const signupBtn = document.getElementById('signupBtn');
        if (!navigator.onLine) {
            banner.classList.remove('hidden');
            signupBtn.disabled = true;
            signupBtn.classList.add('opacity-50', 'cursor-not-allowed');
            signupBtn.textContent = '🚫 Offline – Cannot Sign Up';
        } else {
            banner.classList.add('hidden');
            signupBtn.disabled = false;
            signupBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            signupBtn.textContent = '✅ Register';
        }
    }
    window.addEventListener('online', updateOfflineBanner);
    window.addEventListener('offline', updateOfflineBanner);

    // ----- CLEAR FORM FIELDS -----
    function clearFormFields() {
        document.querySelectorAll('#signupForm input[type="text"], #signupForm input[type="password"]').forEach(input => {
            input.value = '';
        });
        document.getElementById('showPassword').checked = false;
        document.getElementById('password').type = 'password';
        document.getElementById('role').value = 'user';
    }

    // Force clear multiple times to beat browser autofill
    function forceClear() {
        clearFormFields();
        setTimeout(clearFormFields, 50);
        setTimeout(clearFormFields, 200);
    }

    // Clear on page load
    document.addEventListener('DOMContentLoaded', function() {
        forceClear();
        checkAdminCount();
        updateOfflineBanner();
    });

    // Clear also when page is restored from bfcache (back/forward)
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            forceClear();
            checkAdminCount();
            updateOfflineBanner();
        }
    });

    // ----- TOGGLE PASSWORD VISIBILITY -----
    const showPasswordCheckbox = document.getElementById('showPassword');
    const passwordField = document.getElementById('password');
    showPasswordCheckbox.addEventListener('change', () => {
        passwordField.type = showPasswordCheckbox.checked ? 'text' : 'password';
    });

    // ----- CHECK ADMIN COUNT -----
    async function checkAdminCount() {
        try {
            const res = await fetch('/api/auth/admin_count');
            const data = await res.json();
            const adminCount = data.admin_count || 0;
            const roleContainer = document.getElementById('roleContainer');
            const roleNote = document.getElementById('roleNote');
            
            if (adminCount >= 2) {
                roleContainer.style.display = 'none';
                document.getElementById('role').value = 'user';
                roleNote.textContent = 'Maximum 2 admins reached. New accounts will be regular users.';
            } else {
                roleContainer.style.display = 'block';
                if (adminCount === 0) {
                    roleNote.textContent = 'First user can create an Admin account.';
                } else if (adminCount === 1) {
                    roleNote.textContent = 'You can create one more Admin account (2 admins max).';
                } else {
                    roleNote.textContent = '';
                }
            }
        } catch (error) {
            console.error('Error checking admin count:', error);
            document.getElementById('roleContainer').style.display = 'block';
        }
    }

    // ----- HANDLE SIGNUP SUBMISSION -----
    const signupForm = document.getElementById('signupForm');
    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Check offline
        if (!navigator.onLine) {
            alert('You are offline. Please connect to the internet and try again.');
            return;
        }
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        if (!username) {
            alert('Please enter a username');
            return;
        }
        if (password.length < 4) {
            alert('Password must be at least 4 characters long');
            return;
        }
        
        let role = 'user';
        const roleContainer = document.getElementById('roleContainer');
        if (roleContainer.style.display !== 'none') {
            role = document.getElementById('role').value;
        }
        
        try {
            const response = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });
            
            const data = await response.json();
            
            if (data.success) {
                if (role === 'admin') {
                    alert('Admin account created successfully! Please login with your credentials.');
                } else {
                    alert('Account created successfully! Please login.');
                }
                window.location.href = '/login';
            } else {
                alert('Signup failed: ' + (data.error || 'Username may already exist'));
            }
        } catch (error) {
            console.error('Signup error:', error);
            alert('Network error. Please try again.');
        }
    });
</script>
{% endblock %}
