{% extends 'base.html' %}

{% block content %}
<div class="p-6">
    <!-- Header with date range, time range and real-time clock -->
    <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
        <div class="flex flex-wrap items-center gap-4">
            <!-- Date Range Picker -->
            <div class="flex items-center gap-2">
                <input type="date" id="startDate" class="border border-gray-300 rounded-lg px-3 py-2" placeholder="Start Date">
                <span class="text-gray-500">to</span>
                <input type="date" id="endDate" class="border border-gray-300 rounded-lg px-3 py-2" placeholder="End Date">
            </div>
            <!-- Time Range Picker -->
            <div class="flex items-center gap-2">
                <input type="time" id="startTime" class="border border-gray-300 rounded-lg px-3 py-2" step="60">
                <span class="text-gray-500">to</span>
                <input type="time" id="endTime" class="border border-gray-300 rounded-lg px-3 py-2" step="60">
            </div>
            <button id="applyFilterBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">Apply Filter</button>
            <span id="clock" class="text-gray-500 font-mono"></span>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">Total Sales</p>
            <p id="salesValue" class="text-2xl font-bold text-indigo-600">₵0</p>
        </div>
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">Total Profit</p>
            <p id="profitValue" class="text-2xl font-bold text-green-600">₵0</p>
        </div>
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">Total Products</p>
            <p id="productsValue" class="text-2xl font-bold text-blue-600">0</p>
        </div>
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">Low Stock Items</p>
            <p id="lowStockValue" class="text-2xl font-bold text-red-600">0</p>
        </div>
    </div>

    <!-- Top Products & Low Stock Lists (side by side, each scrollable) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <!-- Top Products -->
        <div class="bg-white rounded-xl shadow-md p-4 flex flex-col">
            <h2 class="text-xl font-semibold mb-3">🏆 Top Products</h2>
            <div id="topProductsList" class="flex-1 max-h-80 overflow-y-auto space-y-2 pr-2">
                <!-- dynamic content -->
            </div>
            <p class="text-xs text-gray-400 mt-2">* Based on total quantity sold for selected period</p>
        </div>
        <!-- Low Stock Items -->
        <div class="bg-white rounded-xl shadow-md p-4 flex flex-col">
            <h2 class="text-xl font-semibold mb-3">⚠️ Low Stock Items</h2>
            <div id="lowStockList" class="flex-1 max-h-80 overflow-y-auto space-y-2 pr-2">
                <!-- dynamic content -->
            </div>
        </div>
    </div>

    <!-- Pie Chart & Sales History -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <!-- Pie Chart: Product Distribution -->
        <div class="bg-white rounded-xl shadow-md p-4">
            <h2 class="text-xl font-semibold mb-3">🥧 Product Distribution</h2>
            <canvas id="pieChart" width="400" height="300" class="mx-auto"></canvas>
        </div>
        <!-- Sales History (scrollable) -->
        <div class="bg-white rounded-xl shadow-md p-4 flex flex-col">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-xl font-semibold">📊 Sales History</h2>
                <div class="flex items-center gap-2">
                    <input type="date" id="historyDate" class="border border-gray-300 rounded-lg px-3 py-1 text-sm">
                    <button id="applyHistoryDateBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded-lg text-sm">View</button>
                    <button id="refreshHistoryBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-3 py-1 rounded-lg text-sm">Today</button>
                </div>
            </div>
            <div id="salesHistoryList" class="max-h-96 overflow-y-auto space-y-2 pr-2">
                <!-- dynamic content -->
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let pieChart = null;
    let lowStockShown = false;
    let startDate = null;
    let endDate = null;
    let startTime = null;
    let endTime = null;
    let historyDate = null;

    // Helper: format currency
    function formatMoney(amount) {
        return '₵' + (parseFloat(amount) || 0).toFixed(2);
    }

    // Update clock every second
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('clock').innerText = timeStr;
        setTimeout(updateClock, 1000);
    }
    updateClock();

    // Get formatted datetime range for API
    function getDateTimeRange() {
        let startDateTime = null;
        let endDateTime = null;
        
        if (startDate) {
            startDateTime = startDate;
            if (startTime) {
                startDateTime = `${startDate} ${startTime}:00`;
            }
        }
        
        if (endDate) {
            endDateTime = endDate;
            if (endTime) {
                endDateTime = `${endDate} ${endTime}:00`;
            }
        }
        
        return { start_datetime: startDateTime, end_datetime: endDateTime };
    }

    // Fetch all dashboard data based on date/time range
    async function loadDashboard() {
        try {
            const range = getDateTimeRange();
            let url = '/api/dashboard/summary';
            const params = [];
            
            if (range.start_datetime) params.push(`start_datetime=${encodeURIComponent(range.start_datetime)}`);
            if (range.end_datetime) params.push(`end_datetime=${encodeURIComponent(range.end_datetime)}`);
            
            if (params.length > 0) {
                url += '?' + params.join('&');
            }
            
            const summaryRes = await fetch(url);
            const summary = await summaryRes.json();

            // Update cards
            document.getElementById('salesValue').innerText = formatMoney(summary.sales);
            document.getElementById('profitValue').innerText = formatMoney(summary.profit);
            document.getElementById('productsValue').innerText = summary.total_products;
            document.getElementById('lowStockValue').innerText = summary.low_stock_count;

            // Update low stock list
            const lowStockContainer = document.getElementById('lowStockList');
            lowStockContainer.innerHTML = '';
            if (summary.low_stock_products && summary.low_stock_products.length > 0) {
                summary.low_stock_products.forEach(item => {
                    const [name, brand, category, stock] = item;
                    const div = document.createElement('div');
                    div.className = 'text-red-600 border-b pb-1';
                    div.innerText = `${name} (${brand} | ${category}) — ${stock} left`;
                    lowStockContainer.appendChild(div);
                });
            } else {
                lowStockContainer.innerHTML = '<div class="text-gray-400">No low stock items.</div>';
            }

            // Low stock alert (only once per page load)
            if (!lowStockShown && summary.low_stock_count > 0) {
                let productList = summary.low_stock_products.slice(0, 10).map(item => `• ${item[0]} (${item[1]}) - ${item[3]} left`).join('\n');
                if (summary.low_stock_products.length > 10) {
                    productList += `\n\n... and ${summary.low_stock_products.length - 10} more items`;
                }
                alert(`⚠️ LOW STOCK ALERT ⚠️\n\n${summary.low_stock_count} product(s) are running low:\n\n${productList}\n\nPlease restock soon!`);
                lowStockShown = true;
            }

            // Fetch top products
            let topUrl = '/api/dashboard/top_products';
            if (params.length > 0) {
                topUrl += '?' + params.join('&');
            }
            const topRes = await fetch(topUrl);
            const topProducts = await topRes.json();
            const topContainer = document.getElementById('topProductsList');
            topContainer.innerHTML = '';
            if (topProducts.length) {
                topProducts.forEach((p, index) => {
                    const div = document.createElement('div');
                    div.className = 'border-b pb-1 flex justify-between items-center';
                    let medal = '';
                    if (index === 0) medal = '🥇 ';
                    else if (index === 1) medal = '🥈 ';
                    else if (index === 2) medal = '🥉 ';
                    div.innerHTML = `
                        <span>${medal}${p.name} (${p.brand} | ${p.category})</span>
                        <span class="font-bold text-indigo-600">${p.qty} sold</span>
                    `;
                    topContainer.appendChild(div);
                });
            } else {
                topContainer.innerHTML = '<div class="text-gray-400">No sales data for this period.</div>';
            }

            // Update pie chart
            if (pieChart) pieChart.destroy();
            const ctx = document.getElementById('pieChart').getContext('2d');
            if (topProducts.length) {
                let labels = topProducts.map(p => `${p.name.substring(0, 15)}${p.name.length > 15 ? '...' : ''}`);
                let values = topProducts.map(p => p.qty);
                if (values.length > 8) {
                    const top8Values = values.slice(0,8);
                    const top8Labels = labels.slice(0,8);
                    const othersSum = values.slice(8).reduce((a,b) => a+b, 0);
                    top8Values.push(othersSum);
                    top8Labels.push('Others');
                    pieChart = new Chart(ctx, {
                        type: 'pie',
                        data: { labels: top8Labels, datasets: [{ data: top8Values, backgroundColor: generateColors(top8Labels.length) }] },
                        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
                    });
                } else {
                    pieChart = new Chart(ctx, {
                        type: 'pie',
                        data: { labels: labels, datasets: [{ data: values, backgroundColor: generateColors(labels.length) }] },
                        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
                    });
                }
            } else {
                pieChart = new Chart(ctx, { type: 'pie', data: { labels: ['No Data'], datasets: [{ data: [1], backgroundColor: ['#ccc'] }] } });
            }

            // Load sales history (if history date is set)
            await loadSalesHistory();
        } catch (err) {
            console.error('Error loading dashboard:', err);
        }
    }

    // Load sales history for selected date
    async function loadSalesHistory() {
        try {
            let url = '/api/dashboard/sales_history';
            if (historyDate) {
                url += `?date=${historyDate}`;
            }
            const historyRes = await fetch(url);
            const history = await historyRes.json();
            const historyContainer = document.getElementById('salesHistoryList');
            historyContainer.innerHTML = '';
            
            if (history && history.length > 0) {
                history.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'border-b pb-2 mb-1';
                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="font-medium">${item.date}</span>
                            <span class="font-bold text-green-600">${formatMoney(item.total_sales)}</span>
                        </div>
                        <div class="text-sm text-gray-500 flex justify-between">
                            <span>Profit: ${formatMoney(item.profit)}</span>
                            <span>Discount: ${formatMoney(item.discount)}</span>
                        </div>
                    `;
                    historyContainer.appendChild(div);
                });
            } else {
                historyContainer.innerHTML = '<div class="text-gray-400 text-center py-4">📅 No sales history found for this date.</div>';
            }
        } catch (err) {
            console.error('Error loading sales history:', err);
            document.getElementById('salesHistoryList').innerHTML = '<div class="text-red-400 text-center py-4">Error loading sales history.</div>';
        }
    }

    // Helper to generate colors for pie chart
    function generateColors(n) {
        const colors = [];
        for (let i = 0; i < n; i++) {
            const hue = (i * 360 / n) % 360;
            colors.push(`hsl(${hue}, 70%, 60%)`);
        }
        return colors;
    }

    // Apply filter
    function applyFilter() {
        startDate = document.getElementById('startDate').value;
        endDate = document.getElementById('endDate').value;
        startTime = document.getElementById('startTime').value;
        endTime = document.getElementById('endTime').value;
        
        if (!startDate && !endDate) {
            alert('Please select at least a start date or end date');
            return;
        }
        
        loadDashboard();
    }
    
    // Refresh to current date
    function refreshToCurrent() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').value = today;
        document.getElementById('endDate').value = today;
        document.getElementById('startTime').value = '00:00';
        document.getElementById('endTime').value = '23:59';
        startDate = today;
        endDate = today;
        startTime = '00:00';
        endTime = '23:59';
        loadDashboard();
    }
    
    // Apply history date filter
    function applyHistoryDate() {
        historyDate = document.getElementById('historyDate').value;
        loadSalesHistory();
    }
    
    // Refresh history to today
    function refreshHistoryToToday() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('historyDate').value = today;
        historyDate = today;
        loadSalesHistory();
    }
    
    // Event listeners
    document.getElementById('applyFilterBtn').addEventListener('click', applyFilter);
    document.getElementById('applyHistoryDateBtn').addEventListener('click', applyHistoryDate);
    document.getElementById('refreshHistoryBtn').addEventListener('click', refreshHistoryToToday);
    
    // Set default date range to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDate').value = today;
    document.getElementById('endDate').value = today;
    document.getElementById('startTime').value = '00:00';
    document.getElementById('endTime').value = '23:59';
    document.getElementById('historyDate').value = today;
    startDate = today;
    endDate = today;
    startTime = '00:00';
    endTime = '23:59';
    historyDate = today;
    
    // Initial load
    loadDashboard();
</script>
{% endblock %}
