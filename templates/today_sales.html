{% extends 'base.html' %}

{% block content %}
<div class="p-6">
    <!-- Offline banner -->
    <div id="offlineBanner" class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded hidden">
        ⚠️ You are offline – showing cached sales data (accessories). Data will refresh when you reconnect.
    </div>

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-indigo-600">📊 Sales Overview</h1>
        <button id="refreshBtn" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">🔄 Refresh</button>
    </div>

    <!-- Search Bar -->
    <div class="mb-4">
        <input type="text" id="searchInput" placeholder="🔍 Search product, brand, or user..." 
               class="w-full border border-gray-300 rounded-lg px-4 py-2">
        <p class="text-xs text-gray-500 mt-1">🔎 Type to filter sales records by product, brand, or user</p>
    </div>

    <!-- Period Filter Buttons -->
    <div class="flex flex-wrap gap-2 mb-4">
        <button data-period="daily" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">Today</button>
        <button data-period="weekly" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">This Week</button>
        <button data-period="monthly" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">This Month</button>
        <button data-period="yearly" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">This Year</button>
        <button data-period="all" class="period-btn bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg">All Time</button>
    </div>

    <!-- Date Range Filter -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-6">
        <div class="flex flex-wrap items-end gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">From Date</label>
                <input type="date" id="startDate" class="border rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">To Date</label>
                <input type="date" id="endDate" class="border rounded-lg px-3 py-2">
            </div>
            <button id="applyDateBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">Apply Custom Range</button>
            <button id="pdfBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg ml-auto">🖨️ Print / Save PDF</button>
        </div>
    </div>

    <!-- Sales List (cards) -->
    <div id="salesList" class="space-y-4">
        <div class="text-center text-gray-400 py-8">Loading sales data...</div>
    </div>

    <!-- Summary Bar (fixed at bottom of scroll) -->
    <div id="summaryBar" class="sticky bottom-0 mt-4 bg-gray-900 text-teal-400 rounded-lg p-3 text-center font-bold">
        <!-- totals will appear here -->
    </div>
</div>

<!-- ========== MODAL: SELECT ITEMS TO REVERSE ========== -->
<div id="reverseModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-11/12 max-w-2xl max-h-[90vh] overflow-y-auto">
        <div class="sticky top-0 bg-white p-4 border-b flex justify-between items-center">
            <h3 class="text-xl font-bold" id="reverseModalTitle">Select Items to Reverse</h3>
            <button onclick="closeReverseModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
        </div>
        <div id="reverseItemList" class="p-4 space-y-3"></div>
        <div class="sticky bottom-0 bg-white p-4 border-t flex justify-between">
            <div>
                <button onclick="selectAllReverseItems()" class="bg-blue-500 text-white px-3 py-1 rounded mr-2">Select All</button>
                <button onclick="deselectAllReverseItems()" class="bg-orange-500 text-white px-3 py-1 rounded">Deselect All</button>
            </div>
            <div>
                <button id="confirmReverseBtn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded">Reverse Selected</button>
                <button onclick="closeReverseModal()" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded ml-2">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log("DOM fully loaded - initializing today sales page (accessories only)");
        
        let currentSalesData = [];
        let currentPeriod = 'daily';
        let currentStartDate = null;
        let currentEndDate = null;

        // For reversal modal
        let currentReverseSaleId = null;
        let currentReverseItems = [];

        // ---------- Offline banner ----------
        function updateOfflineBanner() {
            const banner = document.getElementById('offlineBanner');
            if (!navigator.onLine) {
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }
        }
        window.addEventListener('online', updateOfflineBanner);
        window.addEventListener('offline', updateOfflineBanner);

        // ---------- Caching helpers (separate cache for accessories) ----------
        function cacheData(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify({ data, timestamp: Date.now() }));
            } catch(e) {}
        }
        function getCachedData(key, maxAgeMinutes = 60) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                const ageMinutes = (Date.now() - parsed.timestamp) / (1000 * 60);
                if (ageMinutes > maxAgeMinutes) return null;
                return parsed.data;
            } catch(e) { return null; }
        }

        function getCacheKey() {
            // Distinct key for accessories (exclude screens)
            if (currentStartDate && currentEndDate) {
                return `sales_data_accessories_custom_${currentStartDate}_${currentEndDate}`;
            } else {
                return `sales_data_accessories_period_${currentPeriod}`;
            }
        }

        // ---------- Helper: format currency ----------
        function formatMoney(amount) {
            return '₵' + (parseFloat(amount) || 0).toFixed(2);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function getPaymentBadge(paymentMethod, chequeNumber) {
            if (paymentMethod === 'cash') {
                return '<span class="inline-flex items-center bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-medium">💵 Cash</span>';
            } else if (paymentMethod === 'momo') {
                return '<span class="inline-flex items-center bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-medium">📱 Mobile Money</span>';
            } else if (paymentMethod === 'cheque') {
                return `<span class="inline-flex items-center bg-purple-100 text-purple-800 px-2 py-1 rounded text-xs font-medium">📝 Cheque ${chequeNumber ? '#' + escapeHtml(chequeNumber) : ''}</span>`;
            } else {
                return '<span class="inline-flex items-center bg-gray-100 text-gray-800 px-2 py-1 rounded text-xs font-medium">❓ Unknown</span>';
            }
        }

        // ---------- Fetch sales data with offline fallback (EXCLUDE SCREENS) ----------
        async function loadSalesData() {
            updateOfflineBanner();
            console.log("Loading sales data (accessories only)...");
            
            let url = '';
            if (currentStartDate && currentEndDate) {
                url = `/api/today_sales?start_date=${currentStartDate}&end_date=${currentEndDate}&exclude_category=Screen`;
            } else if (currentPeriod === 'all') {
                url = '/api/today_sales?period=all&exclude_category=Screen';
            } else if (currentPeriod === 'weekly') {
                url = '/api/today_sales?period=weekly&exclude_category=Screen';
            } else if (currentPeriod === 'monthly') {
                url = '/api/today_sales?period=monthly&exclude_category=Screen';
            } else if (currentPeriod === 'yearly') {
                url = '/api/today_sales?period=yearly&exclude_category=Screen';
            } else {
                url = '/api/today_sales?period=daily&exclude_category=Screen';
            }
            
            console.log("Fetching from URL:", url);
            let data = [];
            let fromCache = false;

            try {
                const res = await fetch(url);
                if (!res.ok) {
                    if (res.status === 401) { window.location.href = '/login'; return; }
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                data = await res.json();
                cacheData(getCacheKey(), data);
                console.log("Received data:", data.length, "records");
            } catch (error) {
                console.warn("Offline – using cached accessory sales data");
                fromCache = true;
                const cached = getCachedData(getCacheKey());
                if (cached) {
                    data = cached;
                } else {
                    data = [];
                }
            }

            currentSalesData = data;
            applySearchAndRender();
            if (fromCache) {
                document.getElementById('salesList').innerHTML += 
                    '<div class="text-xs text-gray-500 text-center mt-2">⚠️ Data may be outdated (offline)</div>';
            }
        }

        // ---------- Filter and render ----------
        function applySearchAndRender() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = currentSalesData;
            if (searchTerm) {
                filtered = currentSalesData.filter(sale => 
                    (sale.name && sale.name.toLowerCase().includes(searchTerm)) || 
                    (sale.brand && sale.brand.toLowerCase().includes(searchTerm)) ||
                    (sale.username && sale.username.toLowerCase().includes(searchTerm))   // <-- search by username
                );
            }
            renderSales(filtered);
        }

        // ---------- Reverse modal functions (unchanged) ----------
        window.openReverseModal = function(saleId, saleItems) {
            currentReverseSaleId = saleId;
            const container = document.getElementById('reverseItemList');
            container.innerHTML = '';
            currentReverseItems = [];
            
            saleItems.forEach((item, idx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'border rounded-lg p-3 flex items-start space-x-3';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'mt-1';
                cb.dataset.item = JSON.stringify({
                    batch_id: item.batch_id,
                    quantity: item.quantity,
                    product_id: item.product_id
                });
                const info = document.createElement('div');
                info.className = 'flex-1 text-sm';
                info.innerHTML = `
                    <strong>${escapeHtml(item.name)} (${escapeHtml(item.brand)})</strong><br>
                    Batch #${item.batch_id === -1 ? 'DELETED' : item.batch_id}<br>
                    Quantity: ${item.quantity}<br>
                    Selling Price: ${formatMoney(item.selling_price)}<br>
                    Cost: ${formatMoney(item.cost_price)}<br>
                    Profit: ${formatMoney(item.profit)}
                `;
                itemDiv.appendChild(cb);
                itemDiv.appendChild(info);
                container.appendChild(itemDiv);
                currentReverseItems.push({ checkbox: cb, itemData: item });
            });
            
            document.getElementById('reverseModalTitle').innerHTML = `Reverse Items from Sale #${saleId}`;
            document.getElementById('reverseModal').classList.remove('hidden');
        };
        
        window.closeReverseModal = function() {
            document.getElementById('reverseModal').classList.add('hidden');
            currentReverseSaleId = null;
            currentReverseItems = [];
        };
        
        window.selectAllReverseItems = function() {
            currentReverseItems.forEach(i => i.checkbox.checked = true);
        };
        
        window.deselectAllReverseItems = function() {
            currentReverseItems.forEach(i => i.checkbox.checked = false);
        };
        
        async function confirmReverseSelected() {
            if (!navigator.onLine) {
                alert('Reversing sales requires internet. Please connect and try again.');
                return;
            }
            const selected = currentReverseItems.filter(i => i.checkbox.checked);
            if (selected.length === 0) {
                alert('Please select at least one item to reverse.');
                return;
            }
            
            const itemsToReverse = selected.map(i => JSON.parse(i.checkbox.dataset.item));
            
            try {
                const response = await fetch('/api/sales/reverse_items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sale_id: currentReverseSaleId,
                        items: itemsToReverse
                    })
                });
                const data = await response.json();
                if (data.success) {
                    alert(`${selected.length} item(s) reversed successfully. Stock restored.`);
                    closeReverseModal();
                    loadSalesData();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Reverse failed. Please check your internet connection.');
            }
        }

        // ---------- Render sales cards (with username) ----------
        function renderSales(sales) {
            const container = document.getElementById('salesList');
            if (!sales || sales.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-8">No sales recorded for this period.</div>';
                updateSummary([]);
                return;
            }

            const saleMap = new Map();
            for (const sale of sales) {
                if (!saleMap.has(sale.sale_id)) {
                    saleMap.set(sale.sale_id, {
                        discount: sale.discount || 0,
                        total: sale.total || 0,
                        date: sale.sale_date,
                        netProfit: sale.net_profit || 0,
                        payment_method: sale.payment_method || 'unknown',
                        cheque_number: sale.cheque_number,
                        username: sale.username || 'Unknown',   // <-- store username
                        items: []
                    });
                }
                saleMap.get(sale.sale_id).items.push(sale);
            }

            let html = '';
            for (const [saleId, saleGroup] of saleMap) {
                const paymentBadge = getPaymentBadge(saleGroup.payment_method, saleGroup.cheque_number);
                
                const itemsHtml = saleGroup.items.map(item => {
                    const statusText = item.is_deleted_batch ? '⚠️ (Batch Deleted - History Only)' : '';
                    return `
                        <div class="border-b pb-2 mb-2 last:border-0">
                            <div class="font-semibold text-indigo-700">${escapeHtml(item.name)} (${escapeHtml(item.brand)}) ${statusText}</div>
                            <div class="text-sm grid grid-cols-2 gap-1">
                                <div>Qty: ${item.quantity}</div>
                                <div>Selling: ${formatMoney(item.selling_price)}</div>
                                <div>Batch: ${item.batch_id === -1 ? 'DELETED' : '#' + item.batch_id}</div>
                                <div>Cost: ${formatMoney(item.cost_price)}</div>
                                <div>Subtotal: ${formatMoney(item.subtotal)}</div>
                                <div>Profit: ${formatMoney(item.profit)}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                html += `
                    <div class="bg-white rounded-xl shadow-md p-4 border" data-sale-id="${saleId}">
                        <div class="flex justify-between items-start mb-2">
                            <div class="text-sm text-gray-500">Sale #${saleId} | ${saleGroup.date}</div>
                            <div>${paymentBadge}</div>
                        </div>
                        <div class="text-xs text-gray-600 mb-1">👤 User: ${escapeHtml(saleGroup.username)}</div>  <!-- display username -->
                        ${itemsHtml}
                        <div class="mt-2 pt-2 border-t flex justify-between items-center">
                            <button class="reverse-sale-btn bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm" data-sale-id="${saleId}" data-sale-items='${JSON.stringify(saleGroup.items)}'>↺ Reverse Selected Items</button>
                            <div>
                                <span class="text-sm">Discount: ${formatMoney(saleGroup.discount)}</span>
                                <span class="text-lg font-bold ml-4">Total: ${formatMoney(saleGroup.total)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            updateSummary(sales);

            document.querySelectorAll('.reverse-sale-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const saleId = parseInt(btn.getAttribute('data-sale-id'));
                    const saleItems = JSON.parse(btn.getAttribute('data-sale-items'));
                    openReverseModal(saleId, saleItems);
                });
            });
        }

        // ---------- Update summary (unchanged) ----------
        function updateSummary(sales) {
            const seenSales = new Set();
            let totalSales = 0, totalDiscount = 0, totalProfit = 0, totalItems = 0;
            let cashTotal = 0, momoTotal = 0, chequeTotal = 0;
            
            for (const sale of sales) {
                if (!seenSales.has(sale.sale_id)) {
                    totalSales += sale.total || 0;
                    totalDiscount += sale.discount || 0;
                    totalProfit += sale.net_profit || 0;
                    seenSales.add(sale.sale_id);
                    
                    if (sale.payment_method === 'cash') {
                        cashTotal += sale.total || 0;
                    } else if (sale.payment_method === 'momo') {
                        momoTotal += sale.total || 0;
                    } else if (sale.payment_method === 'cheque') {
                        chequeTotal += sale.total || 0;
                    }
                }
                totalItems += sale.quantity || 0;
            }
            
            let periodText = '';
            if (currentStartDate && currentEndDate) {
                periodText = `📅 ${currentStartDate} to ${currentEndDate}`;
            } else {
                switch(currentPeriod) {
                    case 'daily': periodText = '📅 Today'; break;
                    case 'weekly': periodText = '📅 This Week'; break;
                    case 'monthly': periodText = '📅 This Month'; break;
                    case 'yearly': periodText = '📅 This Year'; break;
                    case 'all': periodText = '📅 All Time'; break;
                    default: periodText = '📅 Today';
                }
            }
            
            document.getElementById('summaryBar').innerHTML = 
                `${periodText}  |  🧾 Items: ${totalItems}  |  💰 Sales: ${formatMoney(totalSales)}  |  📉 Discount: ${formatMoney(totalDiscount)}  |  📈 Profit: ${formatMoney(totalProfit)}<br>
                <span class="text-green-400">💵 Cash: ${formatMoney(cashTotal)}</span>  |  
                <span class="text-blue-400">📱 MoMo: ${formatMoney(momoTotal)}</span>  |  
                <span class="text-purple-400">📝 Cheque: ${formatMoney(chequeTotal)}</span>`;
        }

        // ---------- PDF export (offline-aware) ----------
        async function exportPDF() {
            if (!navigator.onLine) {
                alert('PDF export requires internet. Please connect and try again.');
                return;
            }
            if (!currentSalesData.length) {
                alert('No data to export.');
                return;
            }
            let periodText = '';
            if (currentStartDate && currentEndDate) {
                periodText = `Period: ${currentStartDate} to ${currentEndDate}`;
            } else {
                switch(currentPeriod) {
                    case 'daily': periodText = 'Today'; break;
                    case 'weekly': periodText = 'This Week'; break;
                    case 'monthly': periodText = 'This Month'; break;
                    case 'yearly': periodText = 'This Year'; break;
                    case 'all': periodText = 'All Time'; break;
                    default: periodText = 'Today';
                }
            }
            try {
                const response = await fetch('/api/today_sales/pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sales_data: currentSalesData,
                        period_text: periodText + ' (Accessories)'
                    })
                });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `SalesReport_Accessories_${new Date().toISOString().slice(0,19)}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                } else {
                    alert('Failed to generate PDF');
                }
            } catch (error) {
                alert('PDF generation failed. Please check your internet connection.');
            }
        }

        // ---------- Event listeners ----------
        document.getElementById('refreshBtn').addEventListener('click', () => loadSalesData());
        document.getElementById('searchInput').addEventListener('input', () => applySearchAndRender());
        document.getElementById('pdfBtn').addEventListener('click', exportPDF);
        document.getElementById('confirmReverseBtn').addEventListener('click', confirmReverseSelected);
        
        document.getElementById('applyDateBtn').addEventListener('click', () => {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (start && end) {
                currentStartDate = start;
                currentEndDate = end;
                currentPeriod = 'custom';
                loadSalesData();
            } else {
                alert('Please select both start and end dates.');
            }
        });

        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentPeriod = btn.getAttribute('data-period');
                currentStartDate = null;
                currentEndDate = null;
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
                loadSalesData();
            });
        });

        // ---------- Auto-refresh on reconnect ----------
        window.addEventListener('online', function() {
            loadSalesData();
        });

        // ---------- Initial load ----------
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').value = today;
        document.getElementById('endDate').value = today;
        loadSalesData();
    });
</script>
{% endblock %}
