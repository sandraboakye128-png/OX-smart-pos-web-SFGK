{% extends 'base.html' %}

{% block content %}
<div class="p-6">
    <!-- Header & Period Filter -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-indigo-600">📊 Analytics Dashboard</h1>
        <div class="flex gap-2">
            <button data-period="daily" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">Today</button>
            <button data-period="weekly" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">This Week</button>
            <button data-period="monthly" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">This Month</button>
            <button data-period="yearly" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">This Year</button>
            <button data-period="all" class="period-btn bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg">All Time</button>
        </div>
    </div>

    <!-- Date Range Picker -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-6">
        <div class="flex flex-wrap items-end gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">From Date</label>
                <input type="date" id="startDate" class="border rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">To Date</label>
                <input type="date" id="endDate" class="border rounded-lg px-3 py-2">
            </div>
            <button id="applyCustomRange" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">Apply Range</button>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">📦 Items Sold</p>
            <p id="itemsSold" class="text-2xl font-bold text-indigo-600">0</p>
        </div>
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">💰 Revenue</p>
            <p id="revenue" class="text-2xl font-bold text-green-600">₵0</p>
        </div>
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">📈 Profit</p>
            <p id="profit" class="text-2xl font-bold text-blue-600">₵0</p>
        </div>
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">🏷 Discount</p>
            <p id="discount" class="text-2xl font-bold text-red-600">₵0</p>
        </div>
    </div>

    <!-- Trend Chart -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-8">
        <h2 class="text-xl font-semibold mb-4">📈 Sales & Profit Trend</h2>
        <canvas id="trendChart" height="100"></canvas>
    </div>

    <!-- Top Products -->
    <div class="bg-white rounded-xl shadow-md p-4">
        <h2 class="text-xl font-semibold mb-4">🏆 Top Products</h2>
        <div id="topProductsList" class="space-y-2 max-h-80 overflow-y-auto">
            <!-- dynamic list -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let currentPeriod = 'daily';
    let customStartDate = null;
    let customEndDate = null;
    let trendChart = null;

    // Helper: format currency
    function formatMoney(amount) {
        return '₵' + (parseFloat(amount) || 0).toFixed(2);
    }

    // Get date range based on period
    function getDateRange() {
        const now = new Date();
        let startDate = null;
        let endDate = null;
        
        if (customStartDate && customEndDate) {
            return { start_date: customStartDate, end_date: customEndDate };
        }
        
        if (currentPeriod === 'all') {
            return { start_date: null, end_date: null };
        }
        
        switch(currentPeriod) {
            case 'daily':
                startDate = new Date(now);
                endDate = new Date(now);
                break;
            case 'weekly':
                startDate = new Date(now);
                startDate.setDate(now.getDate() - now.getDay());
                endDate = new Date(now);
                break;
            case 'monthly':
                startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                endDate = new Date(now);
                break;
            case 'yearly':
                startDate = new Date(now.getFullYear(), 0, 1);
                endDate = new Date(now);
                break;
            default:
                startDate = null;
                endDate = null;
        }
        
        return { 
            start_date: startDate ? startDate.toISOString().split('T')[0] : null,
            end_date: endDate ? endDate.toISOString().split('T')[0] : null
        };
    }

    // Load summary data using today_sales API
    async function loadSummary() {
        try {
            let salesData = [];
            
            if (customStartDate && customEndDate) {
                // Custom date range - fetch from today_sales API
                const res = await fetch(`/api/today_sales?start_date=${customStartDate}&end_date=${customEndDate}`);
                salesData = await res.json();
            } else if (currentPeriod === 'weekly') {
                const res = await fetch('/api/today_sales?period=weekly');
                salesData = await res.json();
            } else if (currentPeriod === 'monthly') {
                const res = await fetch('/api/today_sales?period=monthly');
                salesData = await res.json();
            } else if (currentPeriod === 'yearly') {
                const res = await fetch('/api/today_sales?period=yearly');
                salesData = await res.json();
            } else if (currentPeriod === 'all') {
                const res = await fetch('/api/today_sales?period=all');
                salesData = await res.json();
            } else {
                // daily
                const res = await fetch('/api/today_sales?period=daily');
                salesData = await res.json();
            }
            
            // Calculate summary from sales data
            const seenSales = new Set();
            let totalSales = 0;
            let totalProfit = 0;
            let totalDiscount = 0;
            let totalItems = 0;
            
            for (const sale of salesData) {
                if (!seenSales.has(sale.sale_id)) {
                    totalSales += sale.total || 0;
                    totalDiscount += sale.discount || 0;
                    totalProfit += sale.net_profit || 0;
                    seenSales.add(sale.sale_id);
                }
                totalItems += sale.quantity || 0;
            }
            
            document.getElementById('itemsSold').innerText = totalItems;
            document.getElementById('revenue').innerText = formatMoney(totalSales);
            document.getElementById('profit').innerText = formatMoney(totalProfit);
            document.getElementById('discount').innerText = formatMoney(totalDiscount);
            
            return salesData;
        } catch (error) {
            console.error("Error loading summary:", error);
            return [];
        }
    }

    // Load trend data (use the same sales data but group by date)
    async function loadTrend() {
        try {
            let salesData = [];
            
            if (customStartDate && customEndDate) {
                const res = await fetch(`/api/today_sales?start_date=${customStartDate}&end_date=${customEndDate}`);
                salesData = await res.json();
            } else if (currentPeriod === 'weekly') {
                const res = await fetch('/api/today_sales?period=weekly');
                salesData = await res.json();
            } else if (currentPeriod === 'monthly') {
                const res = await fetch('/api/today_sales?period=monthly');
                salesData = await res.json();
            } else if (currentPeriod === 'yearly') {
                const res = await fetch('/api/today_sales?period=yearly');
                salesData = await res.json();
            } else if (currentPeriod === 'all') {
                const res = await fetch('/api/today_sales?period=all');
                salesData = await res.json();
            } else {
                const res = await fetch('/api/today_sales?period=daily');
                salesData = await res.json();
            }
            
            // Group by date
            const trendMap = new Map();
            for (const sale of salesData) {
                const date = sale.sale_date.split(' ')[0];
                if (!trendMap.has(date)) {
                    trendMap.set(date, { sales: 0, profit: 0 });
                }
                const current = trendMap.get(date);
                trendMap.set(date, {
                    sales: current.sales + (sale.total || 0),
                    profit: current.profit + (sale.net_profit || 0)
                });
            }
            
            // Convert to sorted arrays
            const sortedDates = Array.from(trendMap.keys()).sort();
            const labels = sortedDates;
            const sales = sortedDates.map(d => trendMap.get(d).sales);
            const profits = sortedDates.map(d => trendMap.get(d).profit);
            
            if (trendChart) {
                trendChart.destroy();
            }
            const ctx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Sales (₵)',
                            data: sales,
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.3,
                            fill: true
                        },
                        {
                            label: 'Profit (₵)',
                            data: profits,
                            borderColor: 'rgb(34, 197, 94)',
                            backgroundColor: 'rgba(34, 197, 94, 0.1)',
                            tension: 0.3,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ₵${context.raw.toFixed(2)}`;
                                }
                            }
                        }
                    }
                }
            });
        } catch (error) {
            console.error("Error loading trend:", error);
        }
    }

    // Load top products
    async function loadTopProducts() {
        try {
            // Use dashboard top_products endpoint
            let url = '/api/dashboard/top_products?limit=10';
            
            if (customStartDate && customEndDate) {
                url = `/api/dashboard/top_products?start_date=${customStartDate}&end_date=${customEndDate}&limit=10`;
            } else if (currentPeriod === 'weekly') {
                url = '/api/dashboard/top_products?period=weekly&limit=10';
            } else if (currentPeriod === 'monthly') {
                url = '/api/dashboard/top_products?period=monthly&limit=10';
            } else if (currentPeriod === 'yearly') {
                url = '/api/dashboard/top_products?period=yearly&limit=10';
            } else if (currentPeriod === 'all') {
                url = '/api/dashboard/top_products?period=all&limit=10';
            } else {
                url = '/api/dashboard/top_products?limit=10';
            }
            
            const res = await fetch(url);
            const products = await res.json();
            const container = document.getElementById('topProductsList');
            
            if (products.length === 0) {
                container.innerHTML = '<div class="text-gray-400 text-center py-4">No product data available.</div>';
                return;
            }
            
            container.innerHTML = '';
            products.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = 'border-b pb-2 flex justify-between items-center';
                let medal = '';
                if (index === 0) medal = '🥇 ';
                else if (index === 1) medal = '🥈 ';
                else if (index === 2) medal = '🥉 ';
                div.innerHTML = `
                    <div>
                        <span class="font-medium">${medal}${p.name}</span>
                        <span class="text-sm text-gray-500"> (${p.brand || 'No brand'} | ${p.category || 'No category'})</span>
                    </div>
                    <div>
                        <span class="font-bold text-indigo-600">${p.qty} sold</span>
                    </div>
                `;
                container.appendChild(div);
            });
        } catch (error) {
            console.error("Error loading top products:", error);
            document.getElementById('topProductsList').innerHTML = '<div class="text-center text-red-400 py-4">Error loading products.</div>';
        }
    }

    // Reload all analytics data
    async function reloadAnalytics() {
        console.log("Reloading analytics for period:", currentPeriod);
        await loadSummary();
        await loadTrend();
        await loadTopProducts();
    }

    // Period button event handlers
    document.querySelectorAll('.period-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentPeriod = btn.getAttribute('data-period');
            customStartDate = null;
            customEndDate = null;
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            reloadAnalytics();
        });
    });

    // Custom date range handler
    document.getElementById('applyCustomRange').addEventListener('click', () => {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        if (startDate && endDate) {
            customStartDate = startDate;
            customEndDate = endDate;
            currentPeriod = 'custom';
            reloadAnalytics();
        } else {
            alert('Please select both start and end dates.');
        }
    });

    // Set default date range to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDate').value = today;
    document.getElementById('endDate').value = today;

    // Initial load
    reloadAnalytics();
</script>
{% endblock %}
