{% extends 'base.html' %}

{% block content %}
<div class="p-6">
    <!-- Header & Period Filter -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-indigo-600">📊 Analytics Dashboard</h1>
        <div class="flex gap-2">
            <button data-period="daily" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">Today</button>
            <button data-period="weekly" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">This Week</button>
            <button data-period="monthly" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">This Month</button>
            <button data-period="yearly" class="period-btn bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg">This Year</button>
            <button data-period="all" class="period-btn bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg">All Time</button>
        </div>
    </div>

    <!-- Date Range Picker -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-6">
        <div class="flex flex-wrap items-end gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">From Date</label>
                <input type="date" id="startDate" class="border rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">To Date</label>
                <input type="date" id="endDate" class="border rounded-lg px-3 py-2">
            </div>
            <button id="applyCustomRange" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">Apply Range</button>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">📦 Items Sold</p>
            <p id="itemsSold" class="text-2xl font-bold text-indigo-600">0</p>
        </div>
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">💰 Revenue</p>
            <p id="revenue" class="text-2xl font-bold text-green-600">₵0</p>
        </div>
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">📈 Profit</p>
            <p id="profit" class="text-2xl font-bold text-blue-600">₵0</p>
        </div>
        <div class="bg-white rounded-xl shadow-md p-4">
            <p class="text-gray-500 text-sm">🏷 Discount</p>
            <p id="discount" class="text-2xl font-bold text-red-600">₵0</p>
        </div>
    </div>

    <!-- Trend Chart -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-8">
        <h2 class="text-xl font-semibold mb-4">📈 Sales & Profit Trend</h2>
        <canvas id="trendChart" height="100"></canvas>
    </div>

    <!-- Top Products -->
    <div class="bg-white rounded-xl shadow-md p-4">
        <h2 class="text-xl font-semibold mb-4">🏆 Top Products</h2>
        <div id="topProductsList" class="space-y-2 max-h-80 overflow-y-auto">
            <!-- dynamic list -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let currentPeriod = 'daily';
    let customStartDate = null;
    let customEndDate = null;
    let trendChart = null;

    // Helper: format currency
    function formatMoney(amount) {
        return '₵' + amount.toFixed(2);
    }

    // Get date range based on period
    function getDateRange() {
        const now = new Date();
        let startDate = null;
        let endDate = null;
        
        if (customStartDate && customEndDate) {
            return { start_date: customStartDate, end_date: customEndDate };
        }
        
        switch(currentPeriod) {
            case 'daily':
                startDate = new Date(now);
                startDate.setHours(0, 0, 0, 0);
                endDate = new Date(now);
                endDate.setHours(23, 59, 59, 999);
                break;
            case 'weekly':
                // Start of current week (Sunday)
                startDate = new Date(now);
                startDate.setDate(now.getDate() - now.getDay());
                startDate.setHours(0, 0, 0, 0);
                endDate = new Date(now);
                endDate.setHours(23, 59, 59, 999);
                break;
            case 'monthly':
                // Start of current month
                startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                startDate.setHours(0, 0, 0, 0);
                endDate = new Date(now);
                endDate.setHours(23, 59, 59, 999);
                break;
            case 'yearly':
                // Start of current year
                startDate = new Date(now.getFullYear(), 0, 1);
                startDate.setHours(0, 0, 0, 0);
                endDate = new Date(now);
                endDate.setHours(23, 59, 59, 999);
                break;
            case 'all':
                startDate = null;
                endDate = null;
                break;
        }
        
        return { 
            start_date: startDate ? startDate.toISOString().split('T')[0] : null,
            end_date: endDate ? endDate.toISOString().split('T')[0] : null
        };
    }

    // Load summary data
    async function loadSummary() {
        const range = getDateRange();
        let url = `/api/analytics/summary?period=${currentPeriod}`;
        if (range.start_date && range.end_date) {
            url = `/api/analytics/summary?start_date=${range.start_date}&end_date=${range.end_date}`;
        }
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('itemsSold').innerText = data.items_sold;
        document.getElementById('revenue').innerText = formatMoney(data.total);
        document.getElementById('profit').innerText = formatMoney(data.profit);
        document.getElementById('discount').innerText = formatMoney(data.discount);
    }

    // Load trend data and update chart
    async function loadTrend() {
        const range = getDateRange();
        let url = `/api/analytics/trend?period=${currentPeriod}`;
        if (range.start_date && range.end_date) {
            url = `/api/analytics/trend?start_date=${range.start_date}&end_date=${range.end_date}`;
        }
        const res = await fetch(url);
        const data = await res.json();
        const labels = data.map(item => item.label);
        const sales = data.map(item => item.sales);
        const profits = data.map(item => item.profit);

        if (trendChart) {
            trendChart.destroy();
        }
        const ctx = document.getElementById('trendChart').getContext('2d');
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Sales',
                        data: sales,
                        borderColor: 'rgb(59, 130, 246)',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.3,
                        fill: true
                    },
                    {
                        label: 'Profit',
                        data: profits,
                        borderColor: 'rgb(34, 197, 94)',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        tension: 0.3,
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `${context.dataset.label}: ₵${context.raw.toFixed(2)}`;
                            }
                        }
                    }
                }
            }
        });
    }

    // Load top products
    async function loadTopProducts() {
        const range = getDateRange();
        let url = `/api/analytics/top_products?period=${currentPeriod}&limit=10`;
        if (range.start_date && range.end_date) {
            url = `/api/analytics/top_products?start_date=${range.start_date}&end_date=${range.end_date}&limit=10`;
        }
        const res = await fetch(url);
        const products = await res.json();
        const container = document.getElementById('topProductsList');
        if (products.length === 0) {
            container.innerHTML = '<div class="text-gray-400 text-center py-4">No product data available.</div>';
            return;
        }
        container.innerHTML = '';
        products.forEach(p => {
            const div = document.createElement('div');
            div.className = 'border-b pb-2 flex justify-between items-center';
            div.innerHTML = `
                <div>
                    <span class="font-medium">${p.name}</span>
                    <span class="text-sm text-gray-500"> (${p.brand || 'No brand'} | ${p.category || 'No category'})</span>
                </div>
                <div>
                    <span class="font-bold text-indigo-600">${p.quantity} sold</span>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // Reload all analytics data
    async function reloadAnalytics() {
        await loadSummary();
        await loadTrend();
        await loadTopProducts();
    }

    // Period button event handlers
    document.querySelectorAll('.period-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentPeriod = btn.getAttribute('data-period');
            customStartDate = null;
            customEndDate = null;
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            reloadAnalytics();
        });
    });

    // Custom date range handler
    document.getElementById('applyCustomRange').addEventListener('click', () => {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        if (startDate && endDate) {
            customStartDate = startDate;
            customEndDate = endDate;
            currentPeriod = 'custom';
            reloadAnalytics();
        } else {
            alert('Please select both start and end dates.');
        }
    });

    // Set default date range to this week
    function setDefaultDates() {
        const now = new Date();
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - now.getDay());
        document.getElementById('startDate').value = startOfWeek.toISOString().split('T')[0];
        document.getElementById('endDate').value = now.toISOString().split('T')[0];
    }
    setDefaultDates();

    // Initial load
    reloadAnalytics();
</script>
{% endblock %}
