{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto p-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">📥 Import Inventory from Excel</h1>

    <div class="bg-white rounded-lg shadow p-6">
        <p class="text-gray-600 mb-4">
            Upload an Excel file (.xlsx or .xls) with the following columns:<br>
            <span class="font-mono text-sm bg-gray-100 px-2 py-1 inline-block mt-1">
                Name, Brand, Category, Quantity, Cost Price, Selling Price, Discount
            </span>
            <br>
            <span class="text-xs text-gray-500">Discount is optional (default 0).</span>
        </p>

        <form id="importForm" enctype="multipart/form-data">
            <div class="flex items-center gap-4">
                <input type="file" id="fileInput" name="file" accept=".xlsx,.xls" required
                       class="border border-gray-300 rounded-md px-3 py-2 focus:ring focus:ring-indigo-200">
                <button type="submit" class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-md">
                    Upload & Import
                </button>
            </div>
            <div id="progress" class="mt-4 hidden">
                <div class="text-sm text-gray-600">Processing...</div>
                <div class="w-full bg-gray-200 rounded-full h-2.5 mt-1">
                    <div id="progressBar" class="bg-teal-500 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <div id="result" class="mt-4"></div>
        </form>
    </div>
</div>

<script>
    document.getElementById('importForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file) {
            alert('Please select a file.');
            return;
        }

        const formData = new FormData();
        formData.append('file', file);

        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const resultDiv = document.getElementById('result');

        progress.classList.remove('hidden');
        progressBar.style.width = '0%';

        try {
            const response = await fetch('/api/inventory/import', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            progressBar.style.width = '100%';

            if (data.success) {
                let html = `<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
                    <strong>✅ Import successful!</strong><br>
                    Imported: ${data.imported} products.
                </div>`;
                if (data.errors && data.errors.length > 0) {
                    html += `<div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded mt-2">
                        <strong>⚠️ Errors (${data.errors.length})</strong>
                        <ul class="list-disc list-inside text-sm">${data.errors.map(e => `<li>${e}</li>`).join('')}</ul>
                    </div>`;
                }
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                    <strong>❌ Import failed:</strong> ${data.error || 'Unknown error'}
                </div>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                <strong>❌ Network error:</strong> ${err.message}
            </div>`;
        } finally {
            progress.classList.add('hidden');
        }
    });
</script>
{% endblock %}
